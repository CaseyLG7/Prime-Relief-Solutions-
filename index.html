<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:#fff; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    .status-open { background:#6c757d; color:#fff; }
    .status-contacted { background:#17a2b8; color:#fff; }
    .status-processing { background:#ffc107; color:#000; }
    .status-closed { background:#28a745; color:#fff; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; }
    th { background:#ddd; }

    .dark-mode tbody td { color:#000 !important; }
  </style>
</head>

<body>

<input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
<input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">

<table>
<thead>
<tr>
<th>Case #</th><th>Name</th><th>Address</th><th>Amount</th><th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

/* ================= DATA ================= */
let allData = [];
let debounceTimer = null;
let renderTimer = null;

/* ================= LOGIN SAFE ================= */
function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

/* ================= FIX 1: DEBOUNCED FILTER ================= */
function debounceFilter(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(applyFilters, 200); // slower = no INP lag
}

function applyFilters(){
  const nameF = searchName.value.toLowerCase();
  const zipF = searchZip.value;

  const filtered = allData.filter(r =>
    (r.name || "").toLowerCase().includes(nameF) &&
    (r.zip || "").includes(zipF)
  );

  queueRender(filtered);
}

/* ================= FIX 2: NON-BLOCKING RENDER ================= */
function queueRender(rows){
  cancelAnimationFrame(renderTimer);
  renderTimer = requestAnimationFrame(() => {
    render(rows);
  });
}

/* ================= FIX 3: FAST DOM RENDER ================= */
function render(rows){
  let html = "";

  for(let i = 0; i < rows.length; i++){
    const r = rows[i];

    html += `
      <tr>
        <td>${r.caseNumber}</td>
        <td>${r.name}</td>
        <td>${r.address}</td>
        <td>$${r.amount}</td>
        <td>
          <button class="status-${r.status?.toLowerCase() || 'open'}"
            onclick="cycle(this,'${r.caseNumber}')">
            ${r.status || "Open"}
          </button>
        </td>
      </tr>
    `;
  }

  tbody.innerHTML = html; // single DOM update (IMPORTANT FIX)
}

/* ================= FIX 4: ASYNC FIRESTORE WRITE ================= */
function cycle(btn,id){

  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  // instant UI update
  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  // async write (DOES NOT BLOCK UI)
  setTimeout(()=>{
    db.collection("cases").doc(id).update({
      status:newState
    });
  }, 0);
}

/* ================= LOAD ================= */
function load(){
  db.collection("cases").onSnapshot(snap=>{
    allData = snap.docs.map(d => d.data());
    queueRender(allData);
  });
}

load();

</script>

</body>
</html>
