<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    input[type="file"] { background:white; color:#000; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    .updatedByCol { font-size:10px; width:80px; }
  </style>
</head>

<body>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Eviction Type</th>
<th>Updated By</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* USERNAME FIX */
function getUsername(email){
  if(!email) return "";
  email=email.toLowerCase();
  if(email.includes("casey30")) return "CaseyG";
  if(email.includes("estosha30")) return "EstoshaG";
  return email;
}

/* 🔥 REAL FIX: ALWAYS REBUILD EVICTION TYPE */
function getEvictionType(row){
  if(row.evictionType) return row.evictionType;

  let txt = JSON.stringify(row).toLowerCase();

  if(txt.includes("forcible") || txt.includes("force")) return "Forcible Entry";
  if(txt.includes("non")) return "Non Payment";

  return "";
}

let allData=[];

function load(){
  db.collection("cases").onSnapshot(snap=>{
    allData = snap.docs.map(d=>{
      let r=d.data();

      return {
        ...r,
        updatedBy:getUsername(r.updatedBy),
        evictionType:getEvictionType(r)
      };
    });

    render(allData);
  });
}

function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  setTimeout(()=>{
    db.collection("cases").doc(id).update({
      status:newState
    });
  },0);
}

function render(rows){
  tbody.innerHTML="";
  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr class="${r.cls}">
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.evictionType}</td>
      <td class="updatedByCol">${r.updatedBy}</td>
    </tr>`;
  });
}

load();

</script>

</body>
</html>
