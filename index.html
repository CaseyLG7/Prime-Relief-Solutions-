<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    input[type="file"] { background:white; color:#000; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .mode-circle {
      width:26px;
      height:26px;
      border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
      border:1px solid #ccc;
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button onclick="openDoc('intake')">Intake</button>
    <button onclick="openDoc('checklist')">Checklist</button>
    <button onclick="openDoc('script')">Call Script</button>
    <button onclick="openDoc('appeal')">Appeal</button>
    <button onclick="openDoc('workflow')">Workflow</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- MAIN SYSTEM UNCHANGED BELOW -->

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label>
      <input type="checkbox" onchange="toggleDark()">
      Dark
    </label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* 🔥 PROFESSIONAL DOCUMENT SYSTEM */
function openDoc(type){
let content="";

if(type==="intake"){
content=`
<h2>Client Intake Form</h2>
<hr>
<b>Client Information</b><br>
Full Name: ___________________________<br>
Phone: ___________________________<br>
Email: ___________________________<br><br>

<b>Property Information</b><br>
Address: ___________________________<br>
City/State/Zip: _____________________<br><br>

<b>Case Details</b><br>

Court: _____________________________<br>
Hearing Date: ______________________<br>

<b>Situation Notes</b><br>

_____________________________________<br><br>

<b>Agent Notes</b><br>
_____________________________________<br><br>

Signature: ____________________ Date: __________`;
}

if(type==="checklist"){
content=`
<h2>Eviction Appeal Checklist</h2>
<hr>
☐ Notice of Appeal Filed<br>
☐ Filing Fee Paid / Pauper Filed<br>
☐ Court Copy Submitted<br>
☐ Landlord Copy Delivered<br>
☐ Lease Agreement Collected<br>
☐ Payment Ledger Collected<br>
☐ Communication Log Started<br>
☐ Client Contact Confirmed<br>
☐ Follow-Up Scheduled<br>
☐ Status Updated in System`;
}

if(type==="script"){
content=`
<h2>Professional Call Script</h2>
<hr>
<b>Opening:</b><br>
Hello, is this [Client Name]? My name is [Your Name] with Prime Relief Solutions.<br><br>

<b>Purpose:</b><br>
I’m calling regarding your eviction case. We help clients legally delay and resolve these situations.<br><br>

<b>Qualify:</b><br>
- Have you already been to court?<br>
- Are you trying to stay in the home?<br>
- Do you need more time?<br><br>

<b>Close:</b><br>
We can help you file immediately and stop the process from moving forward.<br><br>

<b>Next Step:</b><br>
Let’s get your paperwork started now.`;
}

if(type==="appeal"){
content=`
<h2>Texas Notice of Appeal (Template)</h2>
<hr>
Defendant: ___________________________<br>
Case Number: ________________________<br>
Justice Court: _______________________<br><br>

I hereby give notice that I am appealing the judgment in this eviction case.<br><br>

Signature: ___________________________<br>
Date: _______________________________<br><br>

Filed in accordance with Texas Property Code Section 24.`;
}

if(type==="workflow"){
content=`
<h2>LDP Case Workflow System</h2>
<hr>
1. Import eviction data<br>
2. Filter HOT leads ($1000+)<br>
3. Contact client immediately<br>
4. Qualify situation<br>
5. Offer appeal filing service<br>
6. Collect documents/payment<br>
7. File Notice of Appeal<br>
8. Update system status<br>
9. Follow up every 48 hours<br>
10. Close or convert case`;
}

let w=window.open("");
w.document.write(`
<html><body style="font-family:Arial;padding:20px;">
${content}
<br><br>
<button onclick="window.print()">Print</button>
</body></html>
`);
}

/* YOUR ORIGINAL SYSTEM BELOW (UNCHANGED) */

const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let allData=[];
let existingCases=new Set();
let debounceTimer;

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function resetPassword(){
  if(!email.value) return alert("Enter email");
  auth.sendPasswordResetEmail(email.value)
  .then(()=>alert("Reset email sent"));
}

function logout(){
  auth.signOut();
  email.value="";
  password.value="";
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    loginOverlay.style.display="none";
    load();
  } else {
    loginOverlay.style.display="flex";
    email.value="";
    password.value="";
  }
});

function load(){
  db.collection("cases").onSnapshot(snap=>{
    existingCases.clear();
    allData=snap.docs.map(d=>{
      let r=d.data();
      existingCases.add(r.caseNumber);
      return r;
    });
    render(allData);
  });
}

function debounceFilter(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    requestAnimationFrame(applyFilters);
  }, 150);
}

function applyFilters(){
  let nameF = searchName.value.toLowerCase();
  let zipF = searchZip.value;
  let min = Number(minAmt.value)||0;
  let max = Number(maxAmt.value)||999999;

  let rows = allData.filter(r=>{
    return (
      r.name.toLowerCase().includes(nameF) &&
      r.zip.includes(zipF) &&
      r.amount >= min &&
      r.amount <= max
    );
  });

  render(rows);
}

function upload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  let tempDisplay=[];
  let added=0, skipped=0;

  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const headers=lines[0].split("\t").map(h=>h.replace(/"/g,"").trim());

    for(let i=1;i<lines.length;i++){
      let values=lines[i].split("\t");
      let row={};
      headers.forEach((h,idx)=> row[h]=values[idx]?.replace(/"/g,"").trim());

      let caseNum=row["Case Number"];
      let amount=Number(row["Claim Amount"]||0);

      let lead="Cold",cls="row-cold",p=3;
      if(amount>1000){lead="Hot";cls="row-hot";p=1;}
      else if(amount>500){lead="Warm";cls="row-warm";p=2;}

      let record={
        caseNumber:caseNum,
        name:row["Defendant Name"]||"",
        address:row["Defendant Addr Line 1"]+", "+row["Defendant Addr City"],
        amount,
        hearing:row["Next Hearing Date"]||"",
        zip:row["Defendant Addr Zip"]||"",
        lead,cls,p,
        status:"Open",
        updatedBy:currentUser
      };

      tempDisplay.push(record);

      if(!existingCases.has(caseNum)){
        db.collection("cases").doc(caseNum).set(record);
        added++;
      } else skipped++;
    }

    render(tempDisplay);
    alert(`Upload Complete\nAdded: ${added}\nSkipped: ${skipped}`);
    file.value="";
  };
  reader.readAsText(file);
}

function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  setTimeout(()=>{
    db.collection("cases").doc(id).update({
      status:newState,
      updatedBy:currentUser
    });
  },0);
}

function clearView(){
  searchName.value="";
  searchZip.value="";
  minAmt.value="";
  maxAmt.value="";
  render([]);
}

function render(rows){
  tbody.innerHTML="";
  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr class="${r.cls}">
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.updatedBy||""}</td>
      <td><button onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(r.address)}')">Map</button></td>
    </tr>`;
  });
}

function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
