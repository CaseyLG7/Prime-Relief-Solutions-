<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:#fff; }
    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }
    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    .status-open { background:#6c757d; color:#fff; }
    .status-contacted { background:#17a2b8; color:#fff; }
    .status-processing { background:#ffc107; color:#000; }
    .status-closed { background:#28a745; color:#fff; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let existingCases=new Set();

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    document.getElementById("loginOverlay").style.display="none";
    load();
  }
});

function load(){
  db.collection("cases").onSnapshot(snap=>{
    existingCases.clear();
    let data=[];
    snap.forEach(d=>{
      let r=d.data();
      existingCases.add(r.caseNumber);
      data.push(r);
    });
    render(data);
  });
}

/* ✅ FIXED UPLOAD (NON-BLOCKING + BATCH WRITES) */
function upload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  const reader=new FileReader();

  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const headers=lines[0].split("\t").map(h=>h.replace(/"/g,"").trim());

    let index=1;
    let batch = db.batch();
    let batchCount=0;

    function processChunk(){
      let count=0;

      while(index < lines.length && count < 50){ // chunk size
        let values=lines[index].split("\t");
        let row={};
        headers.forEach((h,i)=> row[h]=values[i]?.replace(/"/g,"").trim());

        let caseNum=row["Case Number"];
        if(!caseNum){ index++; continue; }

        let amount=Number(row["Claim Amount"]||0);

        let lead="Cold",cls="row-cold";
        if(amount>1000){lead="Hot";cls="row-hot";}
        else if(amount>500){lead="Warm";cls="row-warm";}

        let record={
          caseNumber:caseNum,
          name:row["Defendant Name"]||"",
          address:(row["Defendant Addr Line 1"]||"")+", "+(row["Defendant Addr City"]||""),
          amount,
          hearing:row["Next Hearing Date"]||"",
          zip:row["Defendant Addr Zip"]||"",
          lead,cls,
          status:"Open",
          updatedBy:currentUser
        };

        if(!existingCases.has(caseNum)){
          let ref = db.collection("cases").doc(caseNum);
          batch.set(ref, record);
          batchCount++;
        }

        index++;
        count++;
      }

      if(batchCount >= 400){
        batch.commit();
        batch = db.batch();
        batchCount = 0;
      }

      if(index < lines.length){
        setTimeout(processChunk, 0); // yield to UI
      } else {
        batch.commit();
        alert("Upload Complete");
      }
    }

    processChunk();
  };

  reader.readAsText(file);
}

/* ✅ FIXED RENDER (NO MORE innerHTML +=) */
function render(rows){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  const fragment = document.createDocumentFragment();

  rows.forEach(r=>{
    const tr = document.createElement("tr");
    tr.className = r.cls;

    tr.innerHTML = `
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.updatedBy||""}</td>
      <td><button onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(r.address)}')">Map</button></td>
    `;

    fragment.appendChild(tr);
  });

  tbody.appendChild(fragment);
}

function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  db.collection("cases").doc(id).update({
    status:newState,
    updatedBy:currentUser
  });
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value);
}

</script>

</body>
</html>
