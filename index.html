<!DOCTYPE html>
<html>
<head>
<title>Prime Relief Solutions</title>

<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f4f6f8;
  color:#000;
}

.dark-mode {
  background:#121212;
  color:#fff;
}

.box {
  background:white;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.dark-mode .box {
  background:#1f1f1f;
}

input, button {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:11px;
}

/* 🔥 PROFESSIONAL BUTTON COLORS */
button {
  cursor:pointer;
  color:white;
  font-weight:bold;
}

/* HEADER BUTTONS */
.header-bar button:nth-child(1) { background:#6f42c1; } /* Case Search */
.header-bar button:nth-child(2) { background:#0d6efd; } /* Intake */
.header-bar button:nth-child(3) { background:#20c997; } /* Checklist */
.header-bar button:nth-child(4) { background:#fd7e14; } /* Script */
.header-bar button:nth-child(5) { background:#198754; } /* Appeal */
.header-bar button:nth-child(6) { background:#6610f2; } /* Workflow */
.header-bar button:nth-child(7) { background:#dc3545; } /* Logout */

button:hover {
  filter:brightness(1.15);
}

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1.5px solid #555;
  padding:6px;
  font-size:11px;
}

th { background:#ddd; }

.dark-mode table {
  background:#1f1f1f;
  color:#fff;
}

.row-hot { background:#f8d7da; }
.row-warm { background:#fff3cd; }
.row-cold { background:#d4edda; }

h1, .subtext {
  color:#BFA13A;
  margin:0;
}

.toggle-container {
  margin-left:auto;
  display:flex;
  gap:8px;
  align-items:center;
}

.mode-circle {
  width:26px;
  height:26px;
  border-radius:50%;
  background: linear-gradient(to right, #3498db 50%, #000 50%);
  border:1px solid #ccc;
}

#loginOverlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  background:
    linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
    url("Prime Relief.PNG") center/cover no-repeat;
}

#loginBox {
  background: rgba(255,255,255,0.9);
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.header-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- HEADER -->
<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">

    <!-- NEW LINK BUTTON (FRONT) -->
    <button onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">
      Case Search
    </button>

    <button onclick="openDoc('intake')">Intake</button>
    <button onclick="openDoc('checklist')">Checklist</button>
    <button onclick="openDoc('script')">Call Script</button>
    <button onclick="openDoc('appeal')">Appeal</button>
    <button onclick="openDoc('workflow')">Workflow</button>

  </div>
</div>

<!-- FILTER BAR -->
<div class="box">
  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label><input type="checkbox" onchange="toggleDark()"> Dark</label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* ================= FULL DOCUMENT SYSTEM (UNCHANGED CONTENT) ================= */
function openDoc(type){
let content="";

if(type==="intake"){
content = `
Initial Call — Intake & Eligibility Check (5–10 minutes)

Your goal: confirm the appeal is still possible.

Ask these immediately:
What date was the eviction judgment signed by the judge?
Which Justice Court handled the case? (Precinct & County)
What date did you receive the judgment?
Have you already filed a Notice of Appeal?
Do you plan to appeal using:
Appeal Bond
Cash Deposit
Statement of Inability to Pay

Explain the deadline clearly

"In Texas, eviction appeals from Justice Court must usually be filed within 5 calendar days of the judgment. I’ll need to confirm your dates to see if you’re still within that window."

If the deadline already passed, explain politely that filing may not be possible.

2️⃣ LDP Disclosure:
We are a Legal Document Preparation service, not attorneys.

3️⃣ Collect Information:
Full Name, Phone, Email, Address, Case Number, Court, etc.

4️⃣ Appeal Methods:
Appeal Bond / Cash Deposit / Statement of Inability to Pay

5️⃣ Service Explanation:
We prepare documents only.

6️⃣ Fee Disclosure:
Our document preparation fee is $___

7️⃣ Required Case Info:
Court, Case Number, Plaintiff, Defendant, Judgment Date

8️⃣ Documents:
Notice of Appeal, Statement of Inability to Pay, Appeal Bond Form

9️⃣ Filing Instructions:
Client files with Justice Court

🔟 Delivery:
Email PDF or printed

1️⃣1️⃣ Follow-up:
Did court accept documents?

1️⃣2️⃣ Record Keeping:
Store case info for business tracking

⚠️ Compliance:
No legal advice, no court representation
Always refer to licensed Texas attorney
`;
}

if(type==="checklist"){
content=`Eviction Appeal Checklist:
Notice of Appeal
Filing Fee
Court Copy
Lease Agreement
Payment Records`;
}

if(type==="script"){
content=`Call Script:
We help legally delay eviction cases.
Do you want more time?
Can you pay partial?
We can file today.`;
}

if(type==="appeal"){
content=`Texas Notice of Appeal Template:
Defendant, Case Number, Court, Signature`;
}

if(type==="workflow"){
content=`Workflow:
Import → Contact → File Appeal → Track → Close`;
}

let w = window.open("");
w.document.write(`<html><body style="font-family:Arial;padding:20px;">${content}<br><button onclick="window.print()">Print</button></body></html>`);
}

/* ================= FIREBASE (UNCHANGED CORE) ================= */

const firebaseConfig = {
apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkXKDp_pA",
authDomain: "prsolutions-lead-management.firebaseapp.com",
projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="", allData=[], existingCases=new Set();

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
if(user){
currentUser=user.email;
loginOverlay.style.display="none";
} else {
loginOverlay.style.display="flex";
}
});

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
