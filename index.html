<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .toggle-label { position:relative; width:50px; height:26px; }
    .toggle-label input { display:none; }

    .slider { position:absolute; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:34px; }
    .slider:before { content:""; position:absolute; height:22px; width:22px; left:2px; bottom:2px; background:white; border-radius:50%; transition:.3s; }

    input:checked + .slider { background:#BFA13A; }
    input:checked + .slider:before { transform:translateX(24px); }

    .mode-circle {
      width:26px; height:26px; border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    /* LOGIN OVERLAY */
    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:white;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #loginBox {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      text-align:center;
    }

    .logout-btn {
      background:#dc3545;
    }

    /* NEW HEADER BAR FOR LOGOUT POSITION */
    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- HEADER + LOGOUT RIGHT -->
<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <button class="logout-btn" onclick="logout()">Logout</button>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label class="toggle-label">
      <input type="checkbox" onchange="toggleDark()">
      <span class="slider"></span>
    </label>
    <div class="mode-circle"></div>
  </div>
</div>

<!-- EVERYTHING ELSE BELOW IS 100% UNCHANGED -->

<script>
// (same JS as before — untouched)
</script>

</body>
</html>
