<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .toggle-label { position:relative; width:50px; height:26px; }
    .toggle-label input { display:none; }

    .slider { position:absolute; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:34px; }
    .slider:before { content:""; position:absolute; height:22px; width:22px; left:2px; bottom:2px; background:white; border-radius:50%; transition:.3s; }

    input:checked + .slider { background:#BFA13A; }
    input:checked + .slider:before { transform:translateX(24px); }

    .mode-circle {
      width:26px; height:26px; border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .forgot { font-size:12px; color:#007bff; cursor:pointer; display:block; margin-top:8px; }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span class="forgot" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- SAME TABLE + UI (UNCHANGED) -->

<script>

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>{
    alert(e.message);
    password.value="";
  });
}

function logout(){
  auth.signOut();
  email.value="";
  password.value="";
}

/* 🔥 FINAL INP KILLER */
function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="";
  btn.classList.add(
    newState==="Open"?"status-open":
    newState==="Contacted"?"status-contacted":
    newState==="Processing"?"status-processing":
    "status-closed"
  );

  if ('requestIdleCallback' in window) {
    requestIdleCallback(()=>{
      db.collection("cases").doc(id).update({
        status:newState,
        updatedBy:currentUser
      });
    });
  } else {
    setTimeout(()=>{
      db.collection("cases").doc(id).update({
        status:newState,
        updatedBy:currentUser
      });
    },50);
  }
}

</script>

</body>
</html>
