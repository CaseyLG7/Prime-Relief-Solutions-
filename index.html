<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button, textarea { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    input[type="file"] { background:white; color:#000; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .mode-circle {
      width:26px;
      height:26px;
      border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
      border:1px solid #ccc;
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    .form-modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      z-index:9999;
      overflow:auto;
    }

    .form-content {
      background:white;
      margin:40px auto;
      padding:20px;
      width:90%;
      max-width:900px;
      border-radius:10px;
    }

    .print-btn { margin-top:10px; }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap;">
    <button onclick="openForm('intake')">Intake Form</button>
    <button onclick="openForm('checklist')">Checklist</button>
    <button onclick="openForm('script')">Call Script</button>
    <button onclick="openForm('appeal')">Notice Appeal</button>
    <button onclick="openForm('workflow')">Workflow</button>
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label>
      <input type="checkbox" onchange="toggleDark()">
      Dark
    </label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- FORM MODAL -->
<div id="formModal" class="form-modal">
  <div class="form-content">
    <div id="formBody"></div>
    <button class="print-btn" onclick="window.print()">Print</button>
    <button onclick="closeForm()">Close</button>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let allData=[];
let existingCases=new Set();
let debounceTimer;

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function resetPassword(){
  if(!email.value) return alert("Enter email");
  auth.sendPasswordResetEmail(email.value)
  .then(()=>alert("Reset email sent"));
}

function logout(){
  auth.signOut();
  email.value="";
  password.value="";
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    loginOverlay.style.display="none";
    load();
  } else {
    loginOverlay.style.display="flex";
    email.value="";
    password.value="";
  }
});

function load(){
  db.collection("cases").onSnapshot(snap=>{
    existingCases.clear();
    allData=snap.docs.map(d=>{
      let r=d.data();
      existingCases.add(r.caseNumber);
      return r;
    });
    render(allData);
  });
}

function debounceFilter(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    requestAnimationFrame(applyFilters);
  }, 150);
}

function applyFilters(){
  let nameF = searchName.value.toLowerCase();
  let zipF = searchZip.value;
  let min = Number(minAmt.value)||0;
  let max = Number(maxAmt.value)||999999;

  let rows = allData.filter(r=>{
    return (
      r.name.toLowerCase().includes(nameF) &&
      r.zip.includes(zipF) &&
      r.amount >= min &&
      r.amount <= max
    );
  });

  render(rows);
}

function upload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  let tempDisplay=[];
  let added=0, skipped=0;

  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const headers=lines[0].split("\t").map(h=>h.replace(/"/g,"").trim());

    for(let i=1;i<lines.length;i++){
      let values=lines[i].split("\t");
      let row={};
      headers.forEach((h,idx)=> row[h]=values[idx]?.replace(/"/g,"").trim());

      let caseNum=row["Case Number"];
      let amount=Number(row["Claim Amount"]||0);

      let lead="Cold",cls="row-cold",p=3;
      if(amount>1000){lead="Hot";cls="row-hot";p=1;}
      else if(amount>500){lead="Warm";cls="row-warm";p=2;}

      let record={
        caseNumber:caseNum,
        name:row["Defendant Name"]||"",
        address:row["Defendant Addr Line 1"]+", "+row["Defendant Addr City"],
        amount,
        hearing:row["Next Hearing Date"]||"",
        zip:row["Defendant Addr Zip"]||"",
        lead,cls,p,
        status:"Open",
        updatedBy:currentUser
      };

      tempDisplay.push(record);

      if(!existingCases.has(caseNum)){
        db.collection("cases").doc(caseNum).set(record);
        added++;
      } else skipped++;
    }

    render(tempDisplay);
    alert(`Upload Complete\nAdded: ${added}\nSkipped: ${skipped}`);
    file.value="";
  };
  reader.readAsText(file);
}

function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  setTimeout(()=>{
    db.collection("cases").doc(id).update({
      status:newState,
      updatedBy:currentUser
    });
  },0);
}

function clearView(){
  searchName.value="";
  searchZip.value="";
  minAmt.value="";
  maxAmt.value="";
  render([]);
}

function render(rows){
  tbody.innerHTML="";
  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr class="${r.cls}">
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.updatedBy||""}</td>
      <td><button onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(r.address)}')">Map</button></td>
    </tr>`;
  });
}

function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

/* FORM CONTENT */
function openForm(type){
  let content="";

  if(type==="script"){
    content=`
    <h2>Professional Call Script</h2>
    <p><b>Initial Call:</b> Confirm judgment date, court, and appeal status.</p>
    <p>"Eviction appeals must be filed within 5 days of judgment."</p>
    <p><b>LDP Disclosure:</b> Not attorneys, no legal advice.</p>
    <p><b>Service:</b> Prepare documents only.</p>
    <p><b>Fee:</b> Clearly explain cost and delivery.</p>
    `;
  }

  if(type==="workflow"){
    content=`
    <h2>LDP Workflow</h2>
    <ol>
      <li>Initial call + eligibility</li>
      <li>Disclosure</li>
      <li>Collect info</li>
      <li>Confirm appeal type</li>
      <li>Prepare documents</li>
      <li>Deliver PDF</li>
      <li>Client files with court</li>
      <li>Follow up</li>
    </ol>
    `;
  }

  if(type==="intake"){
    content=`
    <h2>Client Intake Form</h2>
    Name:<br><input style="width:100%"><br>
    Phone:<br><input style="width:100%"><br>
    Email:<br><input style="width:100%"><br>
    Address:<br><input style="width:100%"><br>
    Case #:<br><input style="width:100%"><br>
    `;
  }

  if(type==="checklist"){
    content=`
    <h2>Eviction Appeal Checklist</h2>
    <ul>
      <li>Notice of Appeal</li>
      <li>Statement of Inability (if needed)</li>
      <li>Bond / Deposit</li>
      <li>Filed within 5 days</li>
      <li>Clerk stamped copies</li>
    </ul>
    `;
  }

  if(type==="appeal"){
    content=`
    <h2>Texas Notice of Appeal Template</h2>
    <p>Case #: ______</p>
    <p>Plaintiff: ______</p>
    <p>Defendant: ______</p>
    <p>I hereby appeal the judgment.</p>
    Signature: ______
    `;
  }

  formBody.innerHTML=content;
  formModal.style.display="block";
}

function closeForm(){
  formModal.style.display="none";
}

</script>

</body>
</html>
