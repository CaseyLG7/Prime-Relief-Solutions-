<!DOCTYPE html>
<html>
<head>
  <title>LDP Auto Lead System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; }
    input, select, button { padding:8px; border-radius:6px; border:1px solid #ccc; }
    button { background:black; color:white; cursor:pointer; }
    table { width:100%; border-collapse:collapse; background:white; margin-top:20px; }
    th, td { border:1px solid #ddd; padding:6px; font-size:12px; }
    th { background:#eee; }
    .green { color:#16a34a; font-weight:bold; }
    .orange { color:#f59e0b; font-weight:bold; }
    .red { color:#dc2626; font-weight:bold; }
  </style>
</head>

<body>

<h1>🚀 LDP Lead System</h1>

<div class="box">
  <input type="file" id="file" />
  <input type="text" id="search" placeholder="Search..." />
  <input type="number" id="minAmount" value="500" />
  <button onclick="exportCSV()">Export Leads</button>
</div>

<div class="box" id="stats">Upload a file to begin</div>

<table id="resultsTable">
<thead>
<tr>
<th>Score</th>
<th>Case</th>
<th>Name</th>
<th>Amount</th>
<th>Days</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data = [];
let filtered = [];

// FILE UPLOAD
document.getElementById("file").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  document.getElementById("stats").innerHTML = "Reading file...";

  const reader = new FileReader();

  reader.onload = e => {
    let text = e.target.result;
    text = text.replace(/\\r/g,"\\n");

    parseAsync(text);
  };

  reader.readAsText(file);
});

// PARSER
function parseAsync(text){
  const lines = text.split("\\n").filter(l=>l.trim());
  const delimiter = lines[0].includes("\\t") ? "\\t" : ",";

  const headers = lines[0].split(delimiter).map(h =>
    h.replace(/"/g,"").trim()
  );

  data = [];
  let i = 1;

  function chunk(){
    for(let j=0;j<200 && i<lines.length;j++,i++){
      let values = lines[i].split(delimiter);
      let obj = {};

      headers.forEach((h,idx)=>{
        obj[h] = values[idx]?.replace(/"/g,"").trim();
      });

      data.push(obj);
    }

    if(i < lines.length){
      setTimeout(chunk,0);
    } else {
      document.getElementById("stats").innerHTML =
        "Loaded " + data.length + " records ✅";

      filter();

      // 👇 AUTO SCROLL TO TABLE
      document.getElementById("resultsTable").scrollIntoView({
        behavior:"smooth"
      });
    }
  }

  chunk();
}

// SCORING
function score(r){
  let amount = Number(r["Claim Amount"]||0);
  let hearing = new Date(r["Next Hearing Date"]);
  let days = Math.floor((hearing - new Date())/(1000*60*60*24));

  let s = 0;
  if(amount > 1000) s+=40;
  if(days <= 7) s+=30;
  if(days <= 3) s+=30;

  return {...r, amount, days, score:s};
}

// FILTER
function filter(){
  let search = document.getElementById("search").value.toLowerCase();
  let min = Number(document.getElementById("minAmount").value);

  filtered = data.map(score)
    .filter(r=>r.amount>=min)
    .filter(r=>Object.values(r).some(v =>
      String(v).toLowerCase().includes(search)
    ))
    .sort((a,b)=>b.score-a.score);

  render();
}

// RENDER
function render(){
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(r=>{
    let color = r.score>=70?"green":r.score>=40?"orange":"red";

    tbody.innerHTML += `
    <tr>
      <td class="${color}">${r.score}</td>
      <td>${r["Case Number"]}</td>
      <td>${r["Defendant Name"]}</td>
      <td>$${r.amount}</td>
      <td>${r.days}</td>
    </tr>`;
  });
}

// EXPORT (SAFE)
function exportCSV(){
  if(filtered.length === 0){
    alert("Load a file first.");
    return;
  }

  let csv="Case,Name,Amount\\n"+
    filtered.map(r =>
      `${r["Case Number"]},${r["Defendant Name"]},${r.amount}`
    ).join("\\n");

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="leads.csv";
  a.click();
}
</script>

</body>
</html>
