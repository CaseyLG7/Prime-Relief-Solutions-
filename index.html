<!DOCTYPE html>
<html>
<head>
  <title>LDP Lead Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      padding:20px;
      background:#f4f6f8;
      color:#000;
      transition:0.3s;
    }

    body.dark {
      background:#111;
      color:#fff;
    }

    .box {
      background:white;
      padding:12px;
      margin-bottom:15px;
      border-radius:10px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    body.dark .box { background:#1f1f1f; }

    input, select, button {
      padding:8px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    body.dark input, body.dark select {
      background:#333;
      color:white;
      border:1px solid #555;
    }

    button {
      background:black;
      color:white;
      cursor:pointer;
    }

    body.dark button { background:#444; }

    table {
      width:100%;
      border-collapse:collapse;
      background:white;
    }

    body.dark table { background:#1f1f1f; }

    th, td {
      border:1px solid #ddd;
      padding:6px;
      font-size:12px;
    }

    body.dark th, body.dark td { border:1px solid #444; }

    th { background:#eee; cursor:pointer; }
    body.dark th { background:#333; }

    .green { color:#16a34a; }
    .orange { color:#f59e0b; }
    .red { color:#dc2626; }

    .tag {
      padding:3px 6px;
      border-radius:6px;
      font-size:10px;
      color:white;
    }

    .hot { background:#dc2626; }
    .warm { background:#f59e0b; }
    .low { background:#16a34a; }
  </style>
</head>

<body>

<h1>🚀 LDP Lead Dashboard</h1>

<div class="box">
  <input type="file" id="file" />
  <button onclick="startUpload()">Upload</button>

  <input type="text" id="search" placeholder="Search..." oninput="filter()" />
  <input type="number" id="minAmount" value="500" oninput="filter()" />

  <button onclick="toggleTheme()">🌗 Toggle Mode</button>

  <button id="exportBtn" onclick="exportCSV()" disabled>Export Leads</button>
</div>

<div class="box" id="stats">Waiting for file...</div>

<h3>📊 Leads</h3>
<table>
<thead>
<tr>
<th onclick="sortBy('score')">Score</th>
<th onclick="sortBy('amount')">Amount</th>
<th>Name</th>
<th>Address</th>
<th>Case</th>
<th>Hearing</th>
<th>Priority</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data=[];
let filtered=[];
let currentSort="score";

// THEME
function toggleTheme(){
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",
    document.body.classList.contains("dark") ? "dark":"light"
  );
}

// LOAD SAVED THEME
if(localStorage.getItem("theme")==="dark"){
  document.body.classList.add("dark");
}

// UPLOAD
function startUpload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  document.getElementById("stats").innerHTML="Reading...";

  const reader=new FileReader();

  reader.onload=e=>{
    parseAsync(e.target.result.replace(/\r/g,"\n"));
  };

  reader.readAsText(file);
}

// PARSER
function parseAsync(text){
  const lines=text.split("\n").filter(l=>l.trim());
  const delimiter=lines[0].includes("\t")?"\t":",";

  const headers=lines[0].split(delimiter).map(h =>
    h.replace(/"/g,"").trim()
  );

  data=[];
  let i=1;

  function chunk(){
    for(let j=0;j<200 && i<lines.length;j++,i++){
      let values=lines[i].split(delimiter);
      let obj={};

      headers.forEach((h,idx)=>{
        obj[h]=values[idx]?.replace(/"/g,"").trim();
      });

      data.push(obj);
    }

    if(i<lines.length){
      setTimeout(chunk,0);
    } else {
      filter();
      document.getElementById("exportBtn").disabled=false;
    }
  }

  chunk();
}

// SCORE + ADDRESS
function score(r){
  let amount=Number(r["Claim Amount"]||0);
  let hearing=new Date(r["Next Hearing Date"]);
  let days=Math.floor((hearing-new Date())/(1000*60*60*24));

  let s=0;
  if(amount>1500) s+=50;
  if(days<=7) s+=30;
  if(days<=3) s+=20;

  let tag=s>=70?"HOT":s>=40?"WARM":"LOW";

  // 👇 ADDRESS BUILDER
  let address = [
    r["Defendant Addr Line 1 "],
    r["Defendant Addr City "],
    r["Defendant Addr State"],
    r["Defendant Addr Zip"]
  ].filter(Boolean).join(", ");

  return {...r,amount,days,score:s,tag,address};
}

// FILTER
function filter(){
  let search=document.getElementById("search").value.toLowerCase();
  let min=Number(document.getElementById("minAmount").value);

  filtered=data.map(score)
    .filter(r=>r.amount>=min)
    .filter(r=>Object.values(r).some(v =>
      String(v).toLowerCase().includes(search)
    ));

  sortBy(currentSort);
}

// SORT
function sortBy(key){
  currentSort=key;
  filtered.sort((a,b)=>b[key]-a[key]);
  render();
}

// RENDER
function render(){
  let tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  filtered.forEach(r=>{
    let color=r.score>=70?"red":r.score>=40?"orange":"green";

    tbody.innerHTML+=`
    <tr>
      <td class="${color}">${r.score}</td>
      <td>$${r.amount}</td>
      <td>${r["Defendant Name"]}</td>
      <td>${r.address}</td>
      <td>${r["Case Number"]}</td>
      <td>${r["Next Hearing Date"]}</td>
      <td><span class="tag ${r.tag.toLowerCase()}">${r.tag}</span></td>
      <td>-</td>
    </tr>`;
  });
}

// EXPORT
function exportCSV(){
  let csv="Name,Address,Amount\n"+
    filtered.map(r =>
      `${r["Defendant Name"]},${r.address},${r.amount}`
    ).join("\n");

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="leads.csv";
  a.click();
}
</script>

</body>
</html>
