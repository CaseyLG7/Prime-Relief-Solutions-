<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; }
    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; }
    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; }
    button { background:black; color:white; cursor:pointer; font-size:11px; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1px solid #ddd; padding:6px; font-size:11px; }
    th { background:#eee; }
  </style>
</head>

<body>

<h1>🏢 Prime Relief Solutions</h1>

<div class="box">
  <input type="file" id="file" />
  <button onclick="startUpload()">Upload</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Defendant Address</th>
<th>Amount</th>
<th>Hearing Date</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data=[];

// 🔥 SAFE FIELD GETTER (handles spacing issues)
function getField(row, name){
  let key = Object.keys(row).find(k =>
    k.trim().toLowerCase() === name.toLowerCase()
  );
  return key ? row[key] : "";
}

// CLEAN
function clean(v){
  if(!v) return "";
  if(v.toLowerCase() === "null") return "";
  return v.trim();
}

// DATE FIX
function parseDate(str){
  if(!str) return new Date(0);
  let p = str.split("/");
  return new Date(p[2], p[0]-1, p[1]);
}

// 🔥 CORRECT TSV PARSER (THIS FIXES EVERYTHING)
function parseTSV(text){
  const lines = text.split("\n").filter(l=>l.trim());
  const headers = lines[0].split("\t").map(h => h.replace(/"/g,"").trim());

  data=[];

  for(let i=1;i<lines.length;i++){
    let row = lines[i];
    let values = row.split("\t"); // safe because it's TAB file
    let obj={};

    headers.forEach((h,idx)=>{
      obj[h] = values[idx]?.replace(/"/g,"").trim();
    });

    data.push(obj);
  }
}

// UPLOAD
function startUpload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  const reader=new FileReader();

  reader.onload=e=>{
    parseTSV(e.target.result);
    process();
  };

  reader.readAsText(file);
}

// PROCESS
function process(){
  let results = data.map(r=>{

    let address = [
      clean(getField(r,"Defendant Addr Line 1")),
      clean(getField(r,"Defendant Addr Line 2")),
      clean(getField(r,"Defendant Addr City")),
      clean(getField(r,"Defendant Addr State")),
      clean(getField(r,"Defendant Addr Zip"))
    ].filter(v=>v).join(", ");

    return {
      name: clean(getField(r,"Defendant Name")),
      amount: Number(getField(r,"Claim Amount")||0),
      hearing: parseDate(getField(r,"Next Hearing Date")),
      hearingText: getField(r,"Next Hearing Date"),
      address
    };
  })
  .sort((a,b)=>a.hearing - b.hearing);

  render(results);
}

// RENDER
function render(rows){
  let tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearingText}</td>
      <td><button onclick="openMap('${r.address}')">Map</button></td>
    </tr>`;
  });
}

// MAP
function openMap(addr){
  if(!addr) return alert("No address found");
  window.open(`https://www.google.com/maps?q=${encodeURIComponent(addr)}`);
}
</script>

</body>
</html>
