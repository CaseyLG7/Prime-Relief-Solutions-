<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EC Inspections Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --primary:#0d47a1; --accent:#00c853; }
body { font-family:'Segoe UI', Arial; margin:0; transition:.3s; }
.dark { background:#0f172a; color:#fff; }
.light { background:#f4f6f8; color:#111; }

.header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:var(--primary); color:#fff; }
.logo { display:flex; align-items:center; gap:15px; }
.logo-box { background:#fff; padding:8px; border-radius:10px; }
.logo img { width:70px; }

.header-right { display:flex; align-items:center; gap:10px; }
.toggle { cursor:pointer; font-size:22px; }

.logout-btn {
padding:6px 12px;
background:#ff5252;
border:none;
color:#fff;
border-radius:6px;
cursor:pointer;
}

.container { padding:20px; max-width:950px; margin:auto; }

table { width:100%; border-collapse:collapse; margin-bottom:20px; }
th, td { padding:8px; text-align:center; }
th { background:rgba(0,0,0,0.1); }
.dark th { background:#1e293b; }

input { width:60px; padding:5px; }

.card { background:#fff; padding:15px; border-radius:12px; margin-bottom:20px; }
.dark .card { background:#1e293b; }

button {
width:100%; padding:12px; background:var(--accent);
border:none; color:#fff; border-radius:10px; cursor:pointer; margin-top:10px;
}

.total { font-size:20px; text-align:center; font-weight:bold; }

textarea { width:100%; height:140px; margin-top:10px; }

.result { margin-top:10px; line-height:1.6; }
.good { color:#00e676; }
.bad { color:#ff5252; }

.hidden { display:none; }

#loginPage {
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0f172a;
}

.login-box {
background:#fff;
padding:30px;
border-radius:12px;
text-align:center;
width:340px;
}

.login-box input {
width:100%;
padding:10px;
margin:10px 0;
font-size:14px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="login-box">
<h2>EC Inspections Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<div id="errorMsg" style="color:red;"></div>
</div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="header">
<div class="logo">
<div class="logo-box"><img src="logo.png"></div>
<h2>EC Inspections</h2>
</div>

<div class="header-right">
<div class="toggle" onclick="toggleTheme()" id="themeIcon">🌙</div>
<button class="logout-btn" onclick="logout()">Logout</button>
</div>
</div>

<div class="container">

<!-- WEEKLY -->
<div class="card">
<h3>Weekly Input</h3>

<table>
<tr>
<th>Type</th>
<th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
<th>Total</th>
</tr>

<tr>
<td>Int/Ext Vacant ($13.25)</td>
<td><input class="ie"></td><td><input class="ie"></td><td><input class="ie"></td>
<td><input class="ie"></td><td><input class="ie"></td><td><input class="ie"></td>
<td><input class="ie"></td>
<td id="ieTotal">0</td>
</tr>

<tr>
<td>Ext Vacants</td>
<td><input class="ext"></td><td><input class="ext"></td><td><input class="ext"></td>
<td><input class="ext"></td><td><input class="ext"></td><td><input class="ext"></td>
<td><input class="ext"></td>
<td id="extTotal">0</td>
</tr>

<tr>
<td>OCC/NC/DH ($7.25)</td>
<td><input class="occ"></td><td><input class="occ"></td><td><input class="occ"></td>
<td><input class="occ"></td><td><input class="occ"></td><td><input class="occ"></td>
<td><input class="occ"></td>
<td id="occTotal">0</td>
</tr>

<tr>
<td>Surveys ($11.25)</td>
<td><input class="sur"></td><td><input class="sur"></td><td><input class="sur"></td>
<td><input class="sur"></td><td><input class="sur"></td><td><input class="sur"></td>
<td><input class="sur"></td>
<td id="surTotal">0</td>
</tr>
</table>

<label>Exterior Vacant Price:</label>
<input id="extPrice" value="0" step="0.01">

<div class="total" id="weekTotal">Week Total: $0.00</div>

<button onclick="clearWeek()">Clear Week</button>
<button onclick="saveWeek()">Save Week</button>
</div>

<!-- BURST -->
<div class="card">
<h3>Invoice Burst Scanner</h3>
From: <input type="date" id="startDate">
To: <input type="date" id="endDate">
<textarea id="burstInput"></textarea>
<button onclick="scanBurst()">Scan Burst</button>
<div id="burstOutput" class="result"></div>
</div>

<!-- PAYOUT -->
<div class="card">
<h3>Payout Sheet</h3>
<textarea id="payoutInput"></textarea>
<button onclick="comparePayout()">Compare</button>
<button onclick="showMissing()">Show Missing Inspections</button>
<div id="compareResult" class="result"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCsM9OI0uP-iaEzUWcnO2rWu0JvuipeKOg",
authDomain:"ec-inspections.firebaseapp.com",
projectId:"ec-inspections"
};

const appFB=initializeApp(firebaseConfig);
const auth=getAuth(appFB);
const db=getFirestore(appFB);

let unsubscribe=null;

window.login=async()=>{
let email=document.getElementById("email").value;
let pass=document.getElementById("password").value;
await signInWithEmailAndPassword(auth,email,pass);
};

onAuthStateChanged(auth,user=>{
if(user){
loginPage.style.display="none";
app.classList.remove("hidden");

// 🔥 LIVE SYNC
if(unsubscribe) unsubscribe();
unsubscribe = onSnapshot(doc(db,"users",user.uid),(snap)=>{
if(snap.exists()){
applyData(snap.data());
localStorage.setItem("weekData",JSON.stringify(snap.data()));
}
});

}else{
loginPage.style.display="flex";
app.classList.add("hidden");
password.value="";
if(unsubscribe) unsubscribe();
}
});

window.logout=()=>signOut(auth);

window.saveWeek=async()=>{
let data=getData();
localStorage.setItem("weekData",JSON.stringify(data));

let user=auth.currentUser;
if(user){
await setDoc(doc(db,"users",user.uid),data);
}
};

function getData(){
let data={ie:[],ext:[],occ:[],sur:[],extPrice:extPrice.value};
["ie","ext","occ","sur"].forEach(cls=>{
document.querySelectorAll("."+cls).forEach(i=>data[cls].push(i.value||0));
});
return data;
}

function applyData(d){
["ie","ext","occ","sur"].forEach(cls=>{
document.querySelectorAll("."+cls).forEach((i,x)=>i.value=d[cls][x]||0);
});
extPrice.value=d.extPrice||0;
calculate();
}
</script>

<script>
function sum(c){let t=0;document.querySelectorAll("."+c).forEach(i=>t+=parseInt(i.value)||0);return t;}

function calculate(){
let ie=sum("ie"),ext=sum("ext"),occ=sum("occ"),sur=sum("sur");
ieTotal.innerText=ie;extTotal.innerText=ext;occTotal.innerText=occ;surTotal.innerText=sur;
let total=(ie*13.25)+(ext*(parseFloat(extPrice.value)||0))+(occ*7.25)+(sur*11.25);
weekTotal.innerText="Week Total: $"+total.toFixed(2);
}

document.querySelectorAll("input").forEach(i=>{
i.addEventListener("input",()=>{
calculate();
saveWeek();
});
});

function clearWeek(){
document.querySelectorAll("input").forEach(i=>i.value=0);
calculate();
saveWeek();
}

let theme=localStorage.getItem("theme")||"dark";
document.body.classList.add(theme);

function toggleTheme(){
document.body.classList.toggle("dark");
document.body.classList.toggle("light");
localStorage.setItem("theme",document.body.classList.contains("dark")?"dark":"light");
}
</script>

</body>
</html>
