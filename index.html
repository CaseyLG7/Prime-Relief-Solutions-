<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:#fff; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    .doc-btn { color:#fff; border:none; }
    .btn-intake { background:#00bcd4; }
    .btn-checklist { background:#4caf50; }
    .btn-script { background:#ff9800; }
    .btn-appeal { background:#9c27b0; }
    .btn-workflow { background:#2196f3; }

    /* ✅ STATUS COLORS RESTORED */
    .status-open { background:#6c757d; color:#fff; }
    .status-contacted { background:#007bff; color:#fff; }
    .status-processing { background:#fd7e14; color:#fff; }
    .status-closed { background:#28a745; color:#fff; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    .dark-mode table { background:#1f1f1f; color:#fff; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    /* ✅ TOGGLE */
    .toggle-container {
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
    }

    .mode-circle {
      width:26px;
      height:26px;
      border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
      border:1px solid #ccc;
    }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <!-- ✅ MOVED UP -->
      <div style="color:#BFA13A;font-size:14px;">
        Professional LDP Eviction Support & Lead Management
      </div>
    </div>
  </div>

  <div>
    <div style="display:flex; gap:8px;">
      <button onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">Case Search</button>
      <button class="clear-btn" onclick="clearView()">Clear View</button>
      <button class="doc-btn btn-intake" onclick="openDoc('intake')">Intake</button>
      <button class="doc-btn btn-checklist" onclick="openDoc('checklist')">Checklist</button>
      <button class="doc-btn btn-script" onclick="openDoc('script')">Call Script</button>
      <button class="doc-btn btn-appeal" onclick="openDoc('appeal')">Appeal</button>
      <button class="doc-btn btn-workflow" onclick="openDoc('workflow')">Workflow</button>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- ✅ TOGGLE ADDED UNDER BUTTONS -->
    <div class="toggle-container">
      <label>
        <input type="checkbox" onchange="toggleDark()"> Dark Mode
      </label>
      <div class="mode-circle"></div>
    </div>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* DOCUMENT SYSTEM (UNCHANGED) */
function openDoc(type){
let content="";
if(type==="intake"){content=`<h2>INTAKE & ELIGIBILITY</h2>`;}
if(type==="checklist"){content=`<h2>CHECKLIST</h2>`;}
if(type==="script"){content=`<h2>CALL SCRIPT</h2>`;}
if(type==="appeal"){content=`<h2>NOTICE OF APPEAL</h2>`;}
if(type==="workflow"){content=`<h2>WORKFLOW</h2>`;}
let w=window.open("");
w.document.write(`<html><body style="font-family:Arial;padding:20px;">${content}<br><br><button onclick="window.print()">Print</button></body></html>`);
}

/* DARK MODE */
function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

/* FIREBASE + REST (UNCHANGED) */
const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let allData=[];
let existingCases=new Set();
let debounceTimer;

function login(){
  const em = document.getElementById("email").value;
  const pw = document.getElementById("password").value;
  auth.signInWithEmailAndPassword(em,pw).catch(e=>alert(e.message));
}

function resetPassword(){
  const em = document.getElementById("email").value;
  if(!em) return alert("Enter email");
  auth.sendPasswordResetEmail(em).then(()=>alert("Reset email sent"));
}

function logout(){
  auth.signOut();
  document.getElementById("email").value="";
  document.getElementById("password").value="";
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    document.getElementById("loginOverlay").style.display="none";
    load();
  } else {
    document.getElementById("loginOverlay").style.display="flex";
  }
});

/* REST OF YOUR ORIGINAL CODE CONTINUES EXACTLY */
</script>

</body>
</html>
