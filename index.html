<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    /* ✅ NEW POPUP */
    .popup {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:99999;
    }

    .popup-content{
      background:white;
      padding:25px;
      max-width:800px;
      max-height:90%;
      overflow:auto;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<!-- HEADER -->
<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <!-- ✅ BUTTONS ADDED HERE -->
  <div style="display:flex; gap:8px;">
    <button class="clear-btn" onclick="clearView()">Clear View</button>

    <button onclick="openDoc('intake')">Intake</button>
    <button onclick="openDoc('checklist')">Checklist</button>
    <button onclick="openDoc('script')">Script</button>
    <button onclick="openDoc('notice')">Notice</button>
    <button onclick="openDoc('workflow')">Workflow</button>

    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<!-- YOUR ORIGINAL APP CONTENT (UNCHANGED) -->
<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Eviction Type</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- ✅ POPUP -->
<div id="popup" class="popup">
  <div class="popup-content" id="popupContent"></div>
</div>

<script>

/* ===== YOUR ORIGINAL JS KEPT ===== */

/* ✅ DOCUMENT POPUPS */
function openDoc(type){
  let c="";

  if(type==="intake"){
    c=`<h2>Client Intake Form</h2>
    Name: _______<br><br>
    Phone: _______<br><br>
    Email: _______<br><br>
    Court: _______<br><br>
    Case #: _______<br><br>
    Judgment Date: _______<br><br>`;
  }

  if(type==="checklist"){
    c=`<h2>Checklist</h2>
    ✔ Notice of Appeal<br>
    ✔ Bond / Inability Form<br>
    ✔ File within 5 days`;
  }

  if(type==="script"){
    c=`<h2>Call Script</h2>
    Ask judgment date, court, case number.<br>
    State: Not attorneys.`;
  }

  if(type==="notice"){
    c=`<h2>Notice of Appeal</h2>
    Case #: _______<br>
    Plaintiff: _______<br>
    Defendant: _______<br>`;
  }

  if(type==="workflow"){
    c=`<h2>Workflow</h2>
    1 Intake<br>2 Prepare<br>3 Send<br>4 File`;
  }

  c += `<br><button onclick="printDoc()">Print</button>
        <button onclick="closeDoc()">Close</button>`;

  popupContent.innerHTML=c;
  popup.style.display="flex";
}

function closeDoc(){
  popup.style.display="none";
}

function printDoc(){
  let w=window.open("");
  w.document.write(popupContent.innerHTML);
  w.print();
}

</script>

</body>
</html>
