<!DOCTYPE html>
<html>
<head>
<title>Prime Relief Solutions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f4f6f8;
  color:#000;
}

.dark-mode {
  background:#121212;
  color:#fff;
}

.box {
  background:white;
  padding:12px;
  margin-bottom:15px;
  border-radius:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}

.dark-mode .box { background:#1f1f1f; }

input, button {
  padding:8px;
  border-radius:6px;
  border:1px solid #ccc;
  font-size:11px;
}

/* BUTTON COLORS */
button {
  cursor:pointer;
  color:white;
  font-weight:bold;
  border:none;
  padding:8px 10px;
  border-radius:6px;
}

.btn-case { background:#6f42c1; }
.btn-intake { background:#0d6efd; }
.btn-checklist { background:#20c997; }
.btn-script { background:#fd7e14; }
.btn-appeal { background:#198754; }
.btn-workflow { background:#6610f2; }
.btn-logout { background:#dc3545; }
.btn-clear { background:#6c757d; }

button:hover { filter:brightness(1.1); }

table {
  width:100%;
  border-collapse:collapse;
  background:white;
}

th, td {
  border:1.5px solid #555;
  padding:6px;
  font-size:11px;
}

th { background:#ddd; }

.row-hot { background:#f8d7da; }
.row-warm { background:#fff3cd; }
.row-cold { background:#d4edda; }

h1, .subtext {
  color:#BFA13A;
  margin:0;
}

.toggle-container {
  margin-left:auto;
  display:flex;
  gap:8px;
  align-items:center;
}

.mode-circle {
  width:26px;
  height:26px;
  border-radius:50%;
  background: linear-gradient(to right, #3498db 50%, #000 50%);
  border:1px solid #ccc;
}

/* LOGIN FIX */
#loginOverlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  background:rgba(0,0,0,0.5);
}

#loginBox {
  background:#fff;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.header-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()" class="btn-case">Login</button>
  </div>
</div>

<!-- HEADER -->
<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button class="btn-case" onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">Case Search</button>
    <button class="btn-intake" onclick="openDoc('intake')">Intake</button>
    <button class="btn-checklist" onclick="openDoc('checklist')">Checklist</button>
    <button class="btn-script" onclick="openDoc('script')">Call Script</button>
    <button class="btn-appeal" onclick="openDoc('appeal')">Appeal</button>
    <button class="btn-workflow" onclick="openDoc('workflow')">Workflow</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<!-- TABLE -->
<div class="box">
  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label><input type="checkbox" onchange="toggleDark()"> Dark</label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* OPEN DOC (FULL RESTORED CONTENT) */
function openDoc(type){
let content="";

if(type==="intake"){
content = `
INITIAL CALL — INTAKE & ELIGIBILITY CHECK

Ask:
- Judgment date
- Court precinct
- Date received
- Appeal filed?
- Appeal method

"You must file within 5 calendar days in Texas."

LDP DISCLOSURE:
We are document preparation only, not attorneys.

CLIENT INFO:
Name, phone, email, address, case number, court.

APPEAL TYPES:
Bond / Cash / Statement of Inability

SERVICE:
We prepare paperwork only.

FEE:
$___

DOCUMENTS:
Notice of Appeal, Statement of Inability, Appeal Bond

FILING:
Client files at court.

FOLLOW-UP:
Confirm clerk acceptance.

NO LEGAL ADVICE GIVEN.
`;
}

if(type==="checklist"){
content=`Notice of Appeal
Filing Fee
Court Copy
Lease
Records`;
}

if(type==="script"){
content=`Call Script:
We help delay eviction legally.
Do you want more time?
We can file today.`;
}

if(type==="appeal"){
content=`Notice of Appeal Template
Name / Case / Court / Signature`;
}

if(type==="workflow"){
content=`1 Import
2 Contact
3 File Appeal
4 Track
5 Close`;
}

let w=window.open("");
w.document.write(`<html><body style="font-family:Arial;padding:20px;">${content}<br><button onclick="window.print()">Print</button></body></html>`);
}

/* FIREBASE */
const firebaseConfig = {
apiKey:"AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
authDomain:"prsolutions-lead-management.firebaseapp.com",
projectId:"prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(user=>{
if(user){
loginOverlay.style.display="none";
} else {
loginOverlay.style.display="flex";
}
});

function toggleDark(){
document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
