<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; transition: all 0.3s; }
    .dark-mode { background:#121212; }
    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }
    input, button, select { padding:8px; border-radius:6px; border:1px solid #ccc; }
    .dark-mode input, .dark-mode select, .dark-mode button { border:1px solid #555; }
    button { background:black; color:white; cursor:pointer; font-size:11px; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1px solid #ddd; padding:6px; font-size:11px; color:#000; }
    th { background:#eee; }
    .hot { background:#ffcccc; }
    .warm { background:#fff0b3; }
    .cold { background:#d0f0d0; }
    .duplicate { font-weight:bold; background:#f0f0ff; }
  </style>
</head>

<body>

<h1>🏢 Prime Relief Solutions</h1>

<div class="box">
  <input type="file" id="file" />
  <button onclick="startUpload()">Upload</button>
  <button onclick="toggleDark()">Toggle Dark/Light</button>
</div>

<table>
<thead>
<tr>
<th>Name</th>
<th>Defendant Address</th>
<th>Amount</th>
<th>Hearing Date</th>
<th>Map</th>
<th>Lead Score</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
let data=[];
let dark=false;

// TOGGLE DARK/LIGHT (text stays black)
function toggleDark(){
  dark = !dark;
  document.body.classList.toggle("dark-mode", dark);
}

// SAFE FIELD GETTER
function getField(row, name){
  let key = Object.keys(row).find(k =>
    k.trim().toLowerCase() === name.toLowerCase()
  );
  return key ? row[key] : "";
}

// CLEAN
function clean(v){
  if(!v) return "";
  if(v.toLowerCase() === "null") return "";
  return v.trim();
}

// DATE FIX
function parseDate(str){
  if(!str) return new Date(0);
  let p = str.split("/");
  return new Date(p[2], p[0]-1, p[1]);
}

// PARSE TSV
function parseTSV(text){
  const lines = text.split("\n").filter(l=>l.trim());
  const headers = lines[0].split("\t").map(h => h.replace(/"/g,"").trim());

  data=[];

  for(let i=1;i<lines.length;i++){
    let row = lines[i];
    let values = row.split("\t");
    let obj={};
    headers.forEach((h,idx)=>{
      obj[h] = values[idx]?.replace(/"/g,"").trim();
    });
    data.push(obj);
  }
}

// UPLOAD
function startUpload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  const reader=new FileReader();
  reader.onload=e=>{
    parseTSV(e.target.result);
    process();
  };
  reader.readAsText(file);
}

// LEAD SCORING (Hot/Warm/Cold based on Claim Amount)
function leadScore(amount){
  if(amount>=1000) return "Hot";
  if(amount>=500) return "Warm";
  return "Cold";
}

// PROCESS
function process(){
  // detect duplicates (same apartment)
  let addressCount={};
  data.forEach(r=>{
    let addr = [
      clean(getField(r,"Defendant Addr Line 1")),
      clean(getField(r,"Defendant Addr Line 2")),
      clean(getField(r,"Defendant Addr City")),
      clean(getField(r,"Defendant Addr State")),
      clean(getField(r,"Defendant Addr Zip"))
    ].filter(v=>v).join(", ");
    r._addressFull = addr;
    addressCount[addr] = (addressCount[addr]||0)+1;
  });

  let results = data.map(r=>{
    return {
      name: clean(getField(r,"Defendant Name")),
      amount: Number(getField(r,"Claim Amount")||0),
      hearing: parseDate(getField(r,"Next Hearing Date")),
      hearingText: getField(r,"Next Hearing Date"),
      address: r._addressFull,
      leadScore: leadScore(Number(getField(r,"Claim Amount")||0)),
      status: "Open",
      duplicate: addressCount[r._addressFull]>1
    };
  }).sort((a,b)=>a.hearing - b.hearing);

  render(results);
}

// RENDER
function render(rows){
  let tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  rows.forEach((r,i)=>{
    tbody.innerHTML+=`
    <tr class="${r.duplicate?'duplicate':''} ${r.leadScore.toLowerCase()}">
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearingText}</td>
      <td><button onclick="openMap('${r.address}')">Map</button></td>
      <td>${r.leadScore}</td>
      <td>
        <select onchange="updateStatus(${i}, this.value)">
          <option ${r.status==='Open'?'selected':''}>Open</option>
          <option ${r.status==='Contacted'?'selected':''}>Contacted</option>
          <option ${r.status==='Closed'?'selected':''}>Closed</option>
        </select>
      </td>
    </tr>`;
  });
}

// UPDATE STATUS
function updateStatus(index, val){
  data[index]._status = val;
}

// MAP
function openMap(addr){
  if(!addr) return alert("No address found");
  window.open(`https://www.google.com/maps?q=${encodeURIComponent(addr)}`);
}
</script>

</body>
</html>
