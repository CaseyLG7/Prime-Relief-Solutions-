<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .toggle-label { position:relative; width:50px; height:26px; }
    .toggle-label input { display:none; }

    .slider { position:absolute; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:34px; }
    .slider:before { content:""; position:absolute; height:22px; width:22px; left:2px; bottom:2px; background:white; border-radius:50%; transition:.3s; }

    input:checked + .slider { background:#BFA13A; }
    input:checked + .slider:before { transform:translateX(24px); }

    .mode-circle {
      width:26px; height:26px; border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    /* LOGIN OVERLAY */
    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:white;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #loginBox {
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
      text-align:center;
    }
  </style>
</head>

<body>

<!-- LOGIN OVERLAY (DOES NOT TOUCH YOUR UI) -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- HEADER -->
<div style="display:flex; align-items:center; gap:15px; margin-bottom:10px;">
  <img src="Prime Relief.PNG" style="height:95px;" />
  <div>
    <h1>Prime Relief Solutions</h1>
    <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label class="toggle-label">
      <input type="checkbox" onchange="toggleDark()">
      <span class="slider"></span>
    </label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management",
  storageBucket: "prsolutions-lead-management.firebasestorage.app",
  messagingSenderId: "354105448091",
  appId: "1:354105448091:web:faca5ab067608a7fbb983e",
  measurementId: "G-G4CLMSC19F"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let allData=[];
let debounceTimer;

/* LOGIN */
function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(e=>alert(e.message));
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser = user.email;
    document.getElementById("loginOverlay").style.display="none";
    load();
  }
});

function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

function clean(v){
  if(!v || v==="null") return "";
  return v.trim();
}

function parseDate(str){
  if(!str) return new Date(0);
  let p=str.split("/");
  return new Date(p[2], p[0]-1, p[1]);
}

function upload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const headers=lines[0].split("\t").map(h=>h.replace(/"/g,"").trim());

    let seen=new Set();

    for(let i=1;i<lines.length;i++){
      let values=lines[i].split("\t");
      let row={};

      headers.forEach((h,idx)=>{
        row[h]=values[idx]?.replace(/"/g,"").trim();
      });

      let name=clean(row["Defendant Name"]);
      let address = [
        clean(row["Defendant Addr Line 1"]),
        clean(row["Defendant Addr City"]),
        clean(row["Defendant Addr State"]),
        clean(row["Defendant Addr Zip"])
      ].join(", ");

      let key=name+address;
      if(seen.has(key)) continue;
      seen.add(key);

      let amount=Number(row["Claim Amount"]||0);

      let lead="Cold", cls="row-cold", p=3;
      if(amount>1000){lead="Hot"; cls="row-hot"; p=1;}
      else if(amount>500){lead="Warm"; cls="row-warm"; p=2;}

      let caseNum=row["Case Number"];

      db.collection("cases").doc(caseNum).set({
        caseNumber: caseNum,
        name,
        address,
        amount,
        hearing: row["Next Hearing Date"]||"",
        zip: clean(row["Defendant Addr Zip"]),
        lead,
        cls,
        p,
        status:"Open",
        updatedBy: currentUser
      });
    }

    alert("Uploaded & Saved to Cloud ✅");
  };
  reader.readAsText(file);
}

function load(){
  db.collection("cases").onSnapshot(snap=>{
    allData = snap.docs.map(d=>d.data())
    .sort((a,b)=> a.p!==b.p ? a.p-b.p : parseDate(a.hearing)-parseDate(b.hearing));
    applyFilters();
  });
}

function debounceFilter(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(applyFilters,200);
}

function applyFilters(){
  let n=document.getElementById("searchName").value.toLowerCase();
  let z=document.getElementById("searchZip").value;
  let min=Number(minAmt.value)||0;
  let max=Number(maxAmt.value)||999999;

  let rows=allData.filter(r=>
    r.name.toLowerCase().includes(n) &&
    r.zip.includes(z) &&
    r.amount>=min &&
    r.amount<=max
  );

  render(rows);
}

function cycle(btn, id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let s=states[next];

  db.collection("cases").doc(id).update({
    status:s,
    updatedBy: currentUser
  });
}

function render(rows){
  tbody.innerHTML="";
  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr class="${r.cls}">
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.updatedBy || ""}</td>
      <td><button onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(r.address)}')">Map</button></td>
    </tr>`;
  });
}

</script>

</body>
</html>
