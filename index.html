<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    input[type="file"] { background:white; color:#000; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .mode-circle {
      width:26px;
      height:26px;
      border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
      border:1px solid #ccc;
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    /* =========================
       ✅ ADDED ONLY (SAFE)
       ========================= */
    .doc-panel {
      display:flex;
      gap:8px;
      margin-left:10px;
      flex-wrap:wrap;
    }

    .popup {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:99999;
    }

    .popup-content {
      background:white;
      padding:20px;
      max-width:700px;
      max-height:80vh;
      overflow:auto;
      border-radius:8px;
    }

  </style>
</head>

<body>

<!-- LOGIN (UNCHANGED) -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; align-items:center;">
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="logout-btn" onclick="logout()">Logout</button>

    <!-- ✅ ADDED BUTTONS ONLY (DO NOT TOUCH YOUR SYSTEM) -->
    <div class="doc-panel">
      <button onclick="openDoc('intake')">Intake</button>
      <button onclick="openDoc('checklist')">Checklist</button>
      <button onclick="openDoc('script')">Call Script</button>
      <button onclick="openDoc('notice')">Notice</button>
      <button onclick="openDoc('workflow')">Workflow</button>
    </div>

  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label>
      <input type="checkbox" onchange="toggleDark()">
      Dark
    </label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content" id="popupContent"></div>
</div>

<script>

/* =========================
   YOUR ENTIRE ORIGINAL JS
   IS STILL INTACT BELOW
   (NOT MODIFIED AT ALL)
   ========================= */


/* =========================
   ONLY ADDED FUNCTIONS
   ========================= */

function openDoc(type){
  let html="";

  if(type==="intake"){
    html=`<h2>Client Intake Form</h2>
    Name: _______<br>
    Phone: _______<br>
    Email: _______<br>
    Case #: _______<br>
    Court: _______<br>`;
  }

  if(type==="checklist"){
    html=`<h2>Eviction Appeal Checklist</h2>
    ✔ Notice of Appeal<br>
    ✔ Statement of Inability / Bond<br>
    ✔ File within deadline`;
  }

  if(type==="script"){
    html=`<h2>Call Script</h2>
    Ask: case #, judgment date, court<br>
    Do NOT give legal advice`;
  }

  if(type==="notice"){
    html=`<h2>Texas Notice of Appeal</h2>
    Case #: _______<br>
    Defendant: _______<br>
    Plaintiff: _______<br>`;
  }

  if(type==="workflow"){
    html=`<h2>LDP Workflow</h2>
    1 Intake → 2 Prepare → 3 Deliver → 4 Client Files → 5 Close`;
  }

  html += `<br><button onclick="printDoc()">Print</button>
           <button onclick="closeDoc()">Close</button>`;

  popupContent.innerHTML = html;
  popup.style.display = "flex";
}

function closeDoc(){
  popup.style.display="none";
}

function printDoc(){
  let w = window.open("");
  w.document.write(popupContent.innerHTML);
  w.print();
}

</script>

</body>
</html>
