<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button, textarea { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    input[type="file"] { background:white; color:#000; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    h1, .subtext { color:#BFA13A; margin:0; }
    .subtext { font-size:14px; margin-top:2px; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .mode-circle {
      width:26px;
      height:26px;
      border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
      border:1px solid #ccc;
    }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }

    /* PRINT MODAL */
    #modal {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    #modalContent {
      background:white;
      padding:20px;
      width:800px;
      max-height:90%;
      overflow:auto;
    }

    @media print {
      body * { visibility:hidden; }
      #modalContent, #modalContent * { visibility:visible; }
      #modalContent { position:absolute; top:0; left:0; width:100%; }
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button onclick="openForm('intake')">Intake Form</button>
    <button onclick="openForm('checklist')">Checklist</button>
    <button onclick="openForm('script')">Call Script</button>
    <button onclick="openForm('notice')">Notice Appeal</button>
    <button onclick="openForm('workflow')">Workflow</button>
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div id="modal">
  <div id="modalContent"></div>
</div>

<script>

/* FORM CONTENTS */
function openForm(type){
  let content="";

  if(type==="intake"){
    content = `
    <h2>Client Intake & Eligibility</h2>
    <b>Ask Immediately:</b><br>
    - Judgment date<br>
    - Court (Precinct & County)<br>
    - Date received<br>
    - Appeal filed?<br>
    - Appeal type (Bond / Cash / Inability)<br><br>

    <b>Client Info:</b><br>
    Name:<br>Phone:<br>Email:<br>
    Address:<br>
    Landlord:<br>
    Case #:<br>
    `;
  }

  if(type==="checklist"){
    content = `
    <h2>Eviction Appeal Checklist</h2>
    ✔ Notice of Appeal<br>
    ✔ Statement of Inability to Pay (if needed)<br>
    ✔ Appeal Bond (if applicable)<br>
    ✔ Certificate of Service<br><br>

    Filing:<br>
    ✔ File within 5 days<br>
    ✔ File with correct Justice Court<br>
    ✔ Get stamped copies<br>
    `;
  }

  if(type==="script"){
    content = `
    <h2>Professional Call Script</h2>
    "Eviction appeals must be filed within 5 days. Let me confirm your eligibility."<br><br>

    "We are a Legal Document Preparation service, not attorneys."<br><br>

    "We prepare your documents, you file them with the court."<br><br>

    "You may want to consult a licensed Texas attorney for legal advice."
    `;
  }

  if(type==="notice"){
    content = `
    <h2>Texas Notice of Appeal Template</h2>
    Defendant: __________<br>
    Plaintiff: __________<br>
    Case #: __________<br>
    Court: __________<br><br>

    "Defendant hereby files Notice of Appeal..."<br><br>

    Signature: __________<br>
    Date: __________
    `;
  }

  if(type==="workflow"){
    content = `
    <h2>LDP Case Workflow</h2>
    1. Intake Call<br>
    2. Disclosure<br>
    3. Collect Info<br>
    4. Confirm Appeal Method<br>
    5. Explain Service<br>
    6. Collect Payment<br>
    7. Prepare Docs<br>
    8. Send Instructions<br>
    9. Deliver Docs<br>
    10. Confirm Filing<br>
    11. Record Case<br><br>

    ⚠️ Never give legal advice.
    `;
  }

  modal.style.display="flex";
  modalContent.innerHTML = content + `<br><br><button onclick="window.print()">Print</button> <button onclick="closeModal()">Close</button>`;
}

function closeModal(){
  modal.style.display="none";
}

/* FIREBASE (UNCHANGED CORE) */
const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function resetPassword(){
  if(!email.value) return alert("Enter email");
  auth.sendPasswordResetEmail(email.value);
}

function logout(){
  auth.signOut();
  email.value="";
  password.value="";
}

auth.onAuthStateChanged(user=>{
  if(user){
    loginOverlay.style.display="none";
  } else {
    loginOverlay.style.display="flex";
    email.value="";
    password.value="";
  }
});

function clearView(){}

function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
