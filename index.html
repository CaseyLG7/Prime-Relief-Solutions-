<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:#fff; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    .doc-btn { color:#fff; border:none; }
    .btn-intake { background:#00bcd4; }
    .btn-checklist { background:#4caf50; }
    .btn-script { background:#ff9800; }
    .btn-appeal { background:#9c27b0; }
    .btn-workflow { background:#2196f3; }

    .status-open { background:#6c757d; color:#fff; }
    .status-contacted { background:#17a2b8; color:#fff; }
    .status-processing { background:#ffc107; color:#000; }
    .status-closed { background:#28a745; color:#fff; }

    .map-btn { background:#007bff; color:#fff; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .dark-mode table { background:#1f1f1f; }
    .dark-mode tbody td { color:#000 !important; }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div style="color:#BFA13A;font-size:14px;">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">Case Search</button>
    <button onclick="window.open('https://jpwebsite.harriscountytx.gov/PublicExtracts/search.jsp')">Files Search</button>
    <button onclick="toggleDark()">🌙</button>
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="doc-btn btn-intake" onclick="openDoc('intake')">Intake</button>
    <button class="doc-btn btn-checklist" onclick="openDoc('checklist')">Checklist</button>
    <button class="doc-btn btn-script" onclick="openDoc('script')">Call Script</button>
    <button class="doc-btn btn-appeal" onclick="openDoc('appeal')">Appeal</button>
    <button class="doc-btn btn-workflow" onclick="openDoc('completion')">Completion Letter</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

/* KEEP YOUR DOC FUNCTION EXACT (UNCHANGED) */
function openDoc(type){
let content="";
const style="font-size:16px; line-height:1.6; white-space:pre-wrap;";

if(type==="script"){ content=`<div style="${style}">Initial Call — Intake & Eligibility Check (5–10 minutes)</div>`;}
if(type==="intake"){ content=`<div style="${style}">Collect Basic Client Information Record:</div>`;}
if(type==="appeal"){ content=`<div style="${style}">Confirm the Appeal Method</div>`;}
if(type==="checklist"){ content=`<div style="${style}">Explain Your Service</div>`;}
if(type==="completion"){ content=`<div style="${style}">LETTER OF SERVICE COMPLETION</div>`;}

let w=window.open("");
w.document.write(`<html><body style="font-family:Arial;padding:20px;">${content}<br><br><button onclick="window.print()">Print</button></body></html>`);
}

/* FIREBASE */

const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let allData=[];
let existingCases=new Set();
let debounceTimer;

function login(){
  const em = email.value;
  const pw = password.value;
  auth.signInWithEmailAndPassword(em,pw).catch(e=>alert(e.message));
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    loginOverlay.style.display="none";
    load();
  } else loginOverlay.style.display="flex";
});

function load(){
  db.collection("cases").onSnapshot(snap=>{
    existingCases.clear();
    allData=snap.docs.map(d=>{
      let r=d.data();
      existingCases.add(r.caseNumber);
      return r;
    });
    render(allData);
  });
}

/* ✅ FIXED UPLOAD (NO LAG) */
function upload(){
  const file=fileInput=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const headers=lines[0].split("\t");

    let i=1;

    function processChunk(){
      let batch=db.batch();
      let count=0;

      while(i<lines.length && count<50){
        let values=lines[i].split("\t");
        let row={};
        headers.forEach((h,idx)=> row[h]=values[idx]);

        let caseNum=row["Case Number"];
        let amount=Number(row["Claim Amount"]||0);

        let lead="Cold",cls="row-cold";
        if(amount>1000){lead="Hot";cls="row-hot";}
        else if(amount>500){lead="Warm";cls="row-warm";}

        let record={
          caseNumber:caseNum,
          name:row["Defendant Name"]||"",
          address:(row["Defendant Addr Line 1"]||"")+", "+(row["Defendant Addr City"]||""),
          amount,
          hearing:row["Next Hearing Date"]||"",
          zip:row["Defendant Addr Zip"]||"",
          lead,cls,
          status:"Open",
          updatedBy:currentUser
        };

        if(!existingCases.has(caseNum)){
          let ref=db.collection("cases").doc(caseNum);
          batch.set(ref,record);
        }

        i++; count++;
      }

      batch.commit().then(()=>{
        if(i<lines.length){
          setTimeout(processChunk,0);
        } else {
          alert("Upload Complete");
        }
      });
    }

    processChunk();
  };

  reader.readAsText(file);
}

function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  db.collection("cases").doc(id).update({
    status:newState,
    updatedBy:currentUser
  });
}

function clearView(){
  searchName.value="";
  searchZip.value="";
  minAmt.value="";
  maxAmt.value="";
  render([]);
}

function render(rows){
  tbody.innerHTML="";
  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr class="${r.cls}">
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.updatedBy||""}</td>
      <td><button class="map-btn" onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(r.address)}')">Map</button></td>
    </tr>`;
  });
}

</script>

</body>
</html>
