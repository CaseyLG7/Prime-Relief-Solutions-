<!DOCTYPE html>
<html>
<head>
<title>Prime Relief Solutions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f6f8; }
.popup {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:99999;
}
.popup-content{
  background:white;
  padding:25px;
  max-width:800px;
  max-height:90%;
  overflow:auto;
}
.print-btn{
  margin-top:10px;
  background:#28a745;
}
</style>
</head>

<body>

<!-- HEADER -->
<div style="display:flex; gap:8px;">
<button onclick="clearView()">Clear View</button>

<button onclick="openDoc('intake')">Intake Form</button>
<button onclick="openDoc('checklist')">Checklist</button>
<button onclick="openDoc('script')">Call Script</button>
<button onclick="openDoc('notice')">Notice Appeal</button>
<button onclick="openDoc('workflow')">Workflow</button>

<button onclick="logout()">Logout</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-content" id="popupContent"></div>
</div>

<script>

/* OPEN DOCUMENT */
function openDoc(type){
  let content="";

  if(type==="intake"){
    content = `
    <h2>Client Intake Form</h2>
    Name: ___________<br><br>
    Phone: ___________<br><br>
    Email: ___________<br><br>
    Court (County/Precinct): ___________<br><br>
    Case Number: ___________<br><br>
    Judgment Date: ___________<br><br>
    Property Address: ___________<br><br>
    Landlord Name: ___________<br><br>
    Appeal Type: Bond / Cash / Inability<br><br>
    Notes: ____________________________
    `;
  }

  if(type==="checklist"){
    content = `
    <h2>Eviction Appeal Checklist</h2>
    ✔ Notice of Appeal<br>
    ✔ Statement of Inability to Pay (if needed)<br>
    ✔ Appeal Bond (if required)<br>
    ✔ Certificate of Service<br>
    ✔ Court copies<br>
    ✔ Filing before 5-day deadline<br>
    `;
  }

  if(type==="script"){
    content = `
    <h2>Call Script</h2>
    Ask:
    <br>• Judgment date?
    <br>• Court location?
    <br>• Case number?
    <br><br>
    Say:
    <br>"We are a document preparation service, not attorneys."
    <br><br>
    Explain:
    <br>• 5-day appeal deadline
    <br>• You prepare documents only
    `;
  }

  if(type==="notice"){
    content = `
    <h2>Texas Notice of Appeal</h2>
    Case No: _________<br>
    Court: _________<br><br>
    Plaintiff: _________<br>
    Defendant: _________<br><br>

    Defendant hereby files Notice of Appeal to County Court.<br><br>

    Date: _________<br>
    Signature: _________
    `;
  }

  if(type==="workflow"){
    content = `
    <h2>LDP Workflow</h2>
    1. Receive call<br>
    2. Check judgment date<br>
    3. Confirm eligibility<br>
    4. Intake client info<br>
    5. Prepare documents<br>
    6. Send to client<br>
    7. Client files<br>
    8. Close case<br>
    `;
  }

  content += `<br><button class="print-btn" onclick="printDoc()">Print</button>
  <button onclick="closeDoc()">Close</button>`;

  popupContent.innerHTML = content;
  popup.style.display="flex";
}

function closeDoc(){
  popup.style.display="none";
}

function printDoc(){
  let w = window.open("");
  w.document.write(popupContent.innerHTML);
  w.print();
}

/* EXISTING FUNCTIONS STAY SAME */
function clearView(){}

function logout(){}

</script>

</body>
</html>
