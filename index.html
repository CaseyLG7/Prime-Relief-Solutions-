<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:#fff; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    .doc-btn { color:#fff; border:none; }
    .btn-intake { background:#00bcd4; }
    .btn-checklist { background:#4caf50; }
    .btn-script { background:#ff9800; }
    .btn-appeal { background:#9c27b0; }
    .btn-workflow { background:#2196f3; }

    /* STATUS COLORS (RESTORED) */
    .status-open { background:#6c757d; color:#fff; }
    .status-contacted { background:#17a2b8; color:#fff; }
    .status-processing { background:#ffc107; color:#000; }
    .status-closed { background:#28a745; color:#fff; }

    /* MAP BUTTON */
    .map-btn { background:#007bff; color:#fff; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .dark-mode table { background:#1f1f1f; }

    /* FIX: KEEP CLIENT DATA (TABLE TEXT) BLACK IN DARK MODE */
    .dark-mode tbody td {
      color:#000 !important;
    }

    .row-hot { background:#f8d7da; }
    .row-warm { background:#fff3cd; }
    .row-cold { background:#d4edda; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div style="color:#BFA13A;font-size:14px;">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">Case Search</button>
    <button onclick="toggleDark()">🌙</button>
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="doc-btn btn-intake" onclick="openDoc('intake')">Intake</button>
    <button class="doc-btn btn-checklist" onclick="openDoc('checklist')">Checklist</button>
    <button class="doc-btn btn-script" onclick="openDoc('script')">Call Script</button>
    <button class="doc-btn btn-appeal" onclick="openDoc('appeal')">Appeal</button>
    <button class="doc-btn btn-workflow" onclick="openDoc('completion')">Completion Letter</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* DARK MODE (SAFE) */
function toggleDark(){
  document.body.classList.toggle("dark-mode");
}

/* DOCUMENT CONTENT (FIXED + BIGGER + VERTICAL) */
function openDoc(type){
let content="";

const style="font-size:16px; line-height:1.6; white-space:pre-wrap;";

if(type==="script"){
content=`<div style="${style}">
Initial Call — Intake & Eligibility Check (5–10 minutes)

Your goal: confirm the appeal is still possible.

Ask these immediately:
What date was the eviction judgment signed by the judge?
Which Justice Court handled the case? (Precinct & County)
What date did you receive the judgment?
Have you already filed a Notice of Appeal?
Do you plan to appeal using:
Appeal Bond
Cash Deposit
Statement of Inability to Pay

Explain the deadline clearly

Example script:
"In Texas, eviction appeals from Justice Court must usually be filed within 5 calendar days of the judgment. I’ll need to confirm your dates to see if you’re still within that window."

If the deadline already passed, explain politely that filing may not be possible.

2️⃣ Provide Your LDP Disclosure (Required)

"I want to let you know that we are a Legal Document Preparation service, not attorneys. We do not provide legal advice or represent clients in court. We assist with preparing the appeal paperwork based on the information you provide."
</div>`;
}

if(type==="intake"){
content=`<div style="${style}">
Collect Basic Client Information Record:

Full Name
Phone number
Email
Property address
County & Precinct Court
Landlord / property management name
Case number (if available)

Keep this organized in a case intake sheet
</div>`;
}

if(type==="appeal"){
content=`<div style="${style}">
Confirm the Appeal Method

Texas allows 3 appeal options.

Appeal Bond
Client pays bond set by the judge.

Cash Deposit
Client deposits amount with court.

Statement of Inability to Pay
Client files sworn statement if unable to afford court costs.

Example explanation:
"Most tenants either file a bond set by the court or a Statement of Inability to Pay if they cannot afford the bond."

You are not advising strategy, only explaining options.
</div>`;
}

if(type==="checklist"){
content=`<div style="${style}">
Explain Your Service

"We prepare the required appeal documents including the Notice of Appeal, Statement of Inability to Pay if applicable, and supporting forms so you can file them with the Justice Court."

They must file the documents themselves
You do not appear in court

Confirm Service Fee

"Our document preparation service fee is $___ for preparing the eviction appeal paperwork."

Payment method
When documents will be delivered

Collect Case Information Needed for Documents

Court Information
County
Justice Precinct
Court address

Case Details
Case number
Plaintiff (landlord)
Defendant (tenant)
Judgment Date

Client mailing address

Prepare the Required Documents

Notice of Appeal
Statement of Inability to Pay
Appeal Bond Form
Certificate of Service

Provide Filing Instructions

"Once you receive the documents, you will file them with the Justice Court that issued the eviction judgment. Filing must occur within the deadline."

File in person or electronically
Bring copies
Ask clerk to stamp

Deliver Documents

Email PDF
Secure download
Printed copies

Confirm Filing

Did the court accept the documents?
Did the clerk stamp them?
Did they receive a hearing notice?

Record the Case

Client name
Case number
Court
Judgment date
Appeal type
Date documents delivered
</div>`;
}

if(type==="completion"){
content=`<div style="${style}">
LETTER OF SERVICE COMPLETION

Date: ___________

Client Name: ___________________________

Re: Eviction Appeal Document Filing – Texas Justice Court

Dear __________________,

This letter confirms that the eviction appeal documents prepared for your case have been filed with the appropriate Texas Justice Court based on the information you provided to our office.

Our document preparation and filing assistance services for this matter are now complete. Please retain copies of your filed documents for your records and monitor any notices or communications you may receive from the court regarding your case.

Please note that our services are limited to document preparation and filing assistance. We do not provide legal advice, legal representation, or court advocacy. If you require legal advice or representation moving forward, you should consult a licensed Texas attorney.

Thank you for allowing us to assist you.

Prime Relief Solutions
Phone: (877) 234-3578
Email: help@prsolution.org
</div>`;
}

let w=window.open("");
w.document.write(`<html><body style="font-family:Arial;padding:20px;">${content}<br><br><button onclick="window.print()">Print</button></body></html>`);
}

/* EVERYTHING BELOW UNTOUCHED */

const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkKXDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let currentUser="";
let allData=[];
let existingCases=new Set();
let debounceTimer;

function login(){
  const em = document.getElementById("email").value;
  const pw = document.getElementById("password").value;
  auth.signInWithEmailAndPassword(em,pw).catch(e=>alert(e.message));
}

function resetPassword(){
  const em = document.getElementById("email").value;
  if(!em) return alert("Enter email");
  auth.sendPasswordResetEmail(em).then(()=>alert("Reset email sent"));
}

function logout(){
  auth.signOut();
  document.getElementById("email").value="";
  document.getElementById("password").value="";
}

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    document.getElementById("loginOverlay").style.display="none";
    load();
  } else {
    document.getElementById("loginOverlay").style.display="flex";
  }
});

function load(){
  db.collection("cases").onSnapshot(snap=>{
    existingCases.clear();
    allData=snap.docs.map(d=>{
      let r=d.data();
      existingCases.add(r.caseNumber);
      return r;
    });
    render(allData);
  });
}

function debounceFilter(){
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    requestAnimationFrame(applyFilters);
  }, 150);
}

function applyFilters(){
  let nameF = searchName.value.toLowerCase();
  let zipF = searchZip.value;
  let min = Number(minAmt.value)||0;
  let max = Number(maxAmt.value)||999999;

  let rows = allData.filter(r=>{
    return (
      r.name.toLowerCase().includes(nameF) &&
      r.zip.includes(zipF) &&
      r.amount >= min &&
      r.amount <= max
    );
  });

  render(rows);
}

function upload(){
  const file=document.getElementById("file").files[0];
  if(!file) return alert("Choose file");

  let tempDisplay=[];
  let added=0, skipped=0;

  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split("\n").filter(l=>l.trim());
    const headers=lines[0].split("\t").map(h=>h.replace(/"/g,"").trim());

    for(let i=1;i<lines.length;i++){
      let values=lines[i].split("\t");
      let row={};
      headers.forEach((h,idx)=> row[h]=values[idx]?.replace(/"/g,"").trim());

      let caseNum=row["Case Number"];
      let amount=Number(row["Claim Amount"]||0);

      let lead="Cold",cls="row-cold";
      if(amount>1000){lead="Hot";cls="row-hot";}
      else if(amount>500){lead="Warm";cls="row-warm";}

      let record={
        caseNumber:caseNum,
        name:row["Defendant Name"]||"",
        address:row["Defendant Addr Line 1"]+", "+row["Defendant Addr City"],
        amount,
        hearing:row["Next Hearing Date"]||"",
        zip:row["Defendant Addr Zip"]||"",
        lead,cls,
        status:"Open",
        updatedBy:currentUser
      };

      tempDisplay.push(record);

      if(!existingCases.has(caseNum)){
        db.collection("cases").doc(caseNum).set(record);
        added++;
      } else skipped++;
    }

    render(tempDisplay);
    alert(`Upload Complete\nAdded: ${added}\nSkipped: ${skipped}`);
    file.value="";
  };
  reader.readAsText(file);
}

function cycle(btn,id){
  const states=["Open","Contacted","Processing","Closed"];
  let next=(states.indexOf(btn.innerText)+1)%states.length;
  let newState=states[next];

  btn.innerText=newState;
  btn.className="status-"+newState.toLowerCase();

  db.collection("cases").doc(id).update({
    status:newState,
    updatedBy:currentUser
  });
}

function clearView(){
  searchName.value="";
  searchZip.value="";
  minAmt.value="";
  maxAmt.value="";
  render([]);
}

function render(rows){
  tbody.innerHTML="";
  rows.forEach(r=>{
    tbody.innerHTML+=`
    <tr class="${r.cls}">
      <td>${r.caseNumber}</td>
      <td>${r.name}</td>
      <td>${r.address}</td>
      <td>$${r.amount}</td>
      <td>${r.hearing}</td>
      <td>${r.lead}</td>
      <td><button class="status-${r.status.toLowerCase()}" onclick="cycle(this,'${r.caseNumber}')">${r.status}</button></td>
      <td>${r.updatedBy||""}</td>
      <td><button class="map-btn" onclick="window.open('https://www.google.com/maps?q=${encodeURIComponent(r.address)}')">Map</button></td>
    </tr>`;
  });
}

</script>

</body>
</html>
