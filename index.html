<!DOCTYPE html>
<html>
<head>
  <title>LDP Auto Eviction Lead System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial; background:#f4f6f8; padding:20px; }
    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; }
    input, select, button { padding:8px; border-radius:6px; border:1px solid #ccc; }
    button { background:black; color:white; cursor:pointer; }
    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1px solid #ddd; padding:6px; font-size:12px; }
    th { background:#eee; }
    .green { color:#16a34a; font-weight:bold; }
    .orange { color:#f59e0b; font-weight:bold; }
    .red { color:#dc2626; font-weight:bold; }
  </style>
</head>

<body>

<h1>🚀 LDP Auto Lead System</h1>

<div class="box">
  <input type="file" id="file" />
  <input type="text" id="search" placeholder="Search..." />
  <input type="number" id="minAmount" value="500" />
  <button onclick="exportCSV()">Export</button>
</div>

<div class="box">
  <input type="text" id="urlInput" placeholder="Court Data URL" />
  <button onclick="saveSource()">Save Source</button>
  <button onclick="loadFromURL()">Manual Sync</button>
</div>

<div class="box" id="stats">System Ready</div>

<table>
<thead>
<tr>
<th>Score</th>
<th>Case</th>
<th>Name</th>
<th>Amount</th>
<th>Days</th>
<th>Status</th>
<th>Save</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<h2>CRM Leads</h2>
<table><tbody id="crm"></tbody></table>

<script>
let data = JSON.parse(localStorage.getItem("data") || "[]");
let filtered = [];
let crm = JSON.parse(localStorage.getItem("crm") || "[]");
let sourceURL = localStorage.getItem("sourceURL");

// INIT
if(sourceURL){
  document.getElementById("urlInput").value = sourceURL;
  autoSync();
}

// FILE UPLOAD
document.getElementById("file").addEventListener("change", e=>{
  const reader = new FileReader();
  reader.onload = e => parseAsync(e.target.result);
  reader.readAsText(e.target.files[0]);
});

// SAVE SOURCE
function saveSource(){
  sourceURL = document.getElementById("urlInput").value;
  localStorage.setItem("sourceURL", sourceURL);
  alert("Source saved. Auto-sync active.");
  autoSync();
}

// AUTO SYNC EVERY 60s
function autoSync(){
  if(!sourceURL) return;

  loadFromURL();
  setInterval(loadFromURL, 60000);
}

// LOAD FROM URL
async function loadFromURL(){
  if(!sourceURL) return;

  document.getElementById("stats").innerHTML = "Auto syncing...";

  try{
    const res = await fetch(sourceURL);
    const text = await res.text();
    parseAsync(text);
  }catch{
    document.getElementById("stats").innerHTML = "Sync failed (retrying...)";
  }
}

// PARSER
function parseAsync(text){
  const lines = text.replace(/\r/g,"\n").split("\n").filter(l=>l.trim());
  const delimiter = lines[0].includes("\t") ? "\t" : ",";
  const headers = lines[0].split(delimiter).map(h=>h.replace(/"/g,"").trim());

  data = [];
  let i = 1;

  function chunk(){
    for(let j=0;j<200 && i<lines.length;j++,i++){
      let values = lines[i].split(delimiter);
      let obj = {};
      headers.forEach((h,idx)=>{
        obj[h] = values[idx]?.replace(/"/g,"").trim();
      });
      data.push(obj);
    }

    if(i < lines.length){
      setTimeout(chunk,0);
    } else {
      localStorage.setItem("data", JSON.stringify(data));
      filter();
    }
  }

  chunk();
}

// SCORE
function score(r){
  let amount = Number(r["Claim Amount"]||0);
  let status = (r["Case Status "]||"").toLowerCase();
  let hearing = new Date(r["Next Hearing Date"]);
  let days = Math.floor((hearing - new Date())/(1000*60*60*24));

  let s = 0;
  if(status.includes("active")) s+=30;
  if(amount>1000) s+=25;
  if(amount>2000) s+=20;
  if(days<=7) s+=15;
  if(days<=3) s+=20;

  return {...r, amount, days, score:s};
}

// FILTER
function filter(){
  let search = document.getElementById("search").value.toLowerCase();
  let min = Number(document.getElementById("minAmount").value);

  filtered = data.map(score)
    .filter(r=>r.score>=50 && r.amount>=min)
    .filter(r=>Object.values(r).some(v=>String(v).toLowerCase().includes(search)))
    .sort((a,b)=>b.score-a.score);

  render();
}

// RENDER
function render(){
  let tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  filtered.forEach(r=>{
    let color = r.score>=80?"green":r.score>=60?"orange":"red";

    tbody.innerHTML += `
    <tr>
      <td class="${color}">${r.score}</td>
      <td>${r["Case Number"]}</td>
      <td>${r["Defendant Name"]}</td>
      <td>$${r.amount}</td>
      <td>${r.days}</td>
      <td>
        <select onchange="updateStatus('${r["Case Number"]}',this.value)">
          <option>New</option>
          <option>Contacted</option>
          <option>Closed</option>
        </select>
      </td>
      <td><button onclick='saveLead(${JSON.stringify(r)})'>Save</button></td>
    </tr>`;
  });

  renderCRM();
  document.getElementById("stats").innerHTML =
    "Leads: "+filtered.length+" | Last Sync: "+new Date().toLocaleTimeString();
}

// CRM
function saveLead(r){
  crm.push({case:r["Case Number"],name:r["Defendant Name"],status:"New"});
  localStorage.setItem("crm",JSON.stringify(crm));
  renderCRM();
}

function updateStatus(c,s){
  crm = crm.map(x=>x.case===c?{...x,status:s}:x);
  localStorage.setItem("crm",JSON.stringify(crm));
  renderCRM();
}

function removeLead(c){
  crm = crm.filter(x=>x.case!==c);
  localStorage.setItem("crm",JSON.stringify(crm));
  renderCRM();
}

function renderCRM(){
  let t = document.getElementById("crm");
  t.innerHTML = "";

  crm.forEach(c=>{
    t.innerHTML += `
    <tr>
      <td>${c.case}</td>
      <td>${c.name}</td>
      <td>${c.status}</td>
      <td><button onclick="removeLead('${c.case}')">X</button></td>
    </tr>`;
  });
}

// EXPORT
function exportCSV(){
  let csv="Case,Name,Amount\n"+
    filtered.map(r=>`${r["Case Number"]},${r["Defendant Name"]},${r.amount}`).join("\n");

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="leads.csv";
  a.click();
}
</script>

</body>
</html>
