<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:#fff; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { background:black; color:white; cursor:pointer; }

    .doc-btn { color:#fff; border:none; }
    .btn-intake { background:#00bcd4; }
    .btn-checklist { background:#4caf50; }
    .btn-script { background:#ff9800; }
    .btn-appeal { background:#9c27b0; }
    .btn-workflow { background:#2196f3; }

    .status-open { background:#6c757d; }
    .status-contacted { background:#007bff; }
    .status-processing { background:#fd7e14; }
    .status-closed { background:#28a745; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; color:#000; }
    th { background:#ddd; }

    .dark-mode table { background:#1f1f1f; }
    .dark-mode th, .dark-mode td { color:#fff; }

    .logout-btn { background:#dc3545; }
    .clear-btn { background:#6c757d; }

    #loginOverlay {
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
      background:
        linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
        url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div style="color:#BFA13A;font-size:14px;">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">Case Search</button>
    <button class="clear-btn" onclick="clearView()">Clear View</button>
    <button class="doc-btn btn-intake" onclick="openDoc('intake')">Intake</button>
    <button class="doc-btn btn-checklist" onclick="openDoc('checklist')">Checklist</button>
    <button class="doc-btn btn-script" onclick="openDoc('script')">Call Script</button>
    <button class="doc-btn btn-appeal" onclick="openDoc('appeal')">Appeal</button>
    <button class="doc-btn btn-workflow" onclick="openDoc('completion')">Completion Letter</button>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</div>

<div class="box">
  <input type="file" id="file" />
  <button onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <label>
    <input type="checkbox" onclick="document.body.classList.toggle('dark-mode')">
    Dark Mode
  </label>
</div>

<script>

function openDoc(type){
let content="";

if(type==="script"){
content=`<h2>Initial Call — Intake & Eligibility Check (5–10 minutes)</h2>

<p>Your goal: confirm the appeal is still possible.</p>

<b>Ask these immediately:</b><br><br>

What date was the eviction judgment signed by the judge?<br>
Which Justice Court handled the case?<br>
(Precinct & County)<br>
What date did you receive the judgment?<br>
Have you already filed a Notice of Appeal?<br><br>

Do you plan to appeal using:<br>
• Appeal Bond<br>
• Cash Deposit<br>
• Statement of Inability to Pay<br><br>

<b>Explain the deadline clearly</b><br><br>

"In Texas, eviction appeals from Justice Court must usually be filed within 5 calendar days of the judgment. I’ll need to confirm your dates to see if you’re still within that window."<br><br>

If the deadline already passed, explain politely that filing may not be possible.<br><br>

<b>2️⃣ Provide Your LDP Disclosure (Required)</b><br><br>

"I want to let you know that we are a Legal Document Preparation service, not attorneys. We do not provide legal advice or represent clients in court. We assist with preparing the appeal paperwork based on the information you provide."`;
}

if(type==="intake"){
content=`<h2>Client Intake Sheet</h2>

Collect Basic Client Information Record:<br><br>

Full Name<br>
Phone number<br>
Email<br>
Property address<br>
County & Precinct Court<br>
Landlord / property management name<br>
Case number (if available)<br><br>

Keep this organized in a case intake sheet`;
}

if(type==="appeal"){
content=`<h2>Appeal Method</h2>

Confirm the Appeal Method<br><br>

Texas allows 3 appeal options.<br><br>

<b>Appeal Bond</b><br>
Client pays bond set by the judge.<br><br>

<b>Cash Deposit</b><br>
Client deposits amount with court.<br><br>

<b>Statement of Inability to Pay</b><br>
Client files sworn statement if unable to afford court costs.<br><br>

<b>Example explanation:</b><br>
"Most tenants either file a bond set by the court or a Statement of Inability to Pay if they cannot afford the bond."<br><br>

You are not advising strategy, only explaining options.`;
}

if(type==="checklist"){
content=`<h2>Full Checklist</h2>

<b>Explain Your Service</b><br><br>

"We prepare the required appeal documents including the Notice of Appeal, Statement of Inability to Pay if applicable, and supporting forms so you can file them with the Justice Court."<br><br>

They must file the documents themselves<br>
You do not appear in court<br><br>

<b>Confirm Service Fee</b><br><br>

"Our document preparation service fee is $___ for preparing the eviction appeal paperwork."<br><br>

Payment method<br>
When documents will be delivered<br><br>

<b>Collect Case Information</b><br><br>

Court Information<br>
County<br>
Justice Precinct<br>
Court address<br><br>

Case Details<br>
Case number<br>
Plaintiff (landlord)<br>
Defendant (tenant)<br>
Judgment Date<br><br>

Client mailing address<br><br>

<b>Prepare Documents</b><br><br>

Notice of Appeal<br>
Statement of Inability<br>
Appeal Bond Form<br>
Certificate of Service<br><br>

<b>Filing Instructions</b><br><br>

File with Justice Court<br>
Bring copies<br>
Ask clerk to stamp<br><br>

<b>Follow Up</b><br><br>

Confirm filing<br>
Hearing notice<br><br>

<b>Record Case</b><br><br>

Client name<br>
Case number<br>
Court<br>
Judgment date<br>
Appeal type<br>
Date delivered`;
}

if(type==="completion"){
content=`<h2>LETTER OF SERVICE COMPLETION</h2>

Date: ___________<br><br>

Client Name: ___________________________<br><br>

Re: Eviction Appeal Document Filing – Texas Justice Court<br><br>

Dear __________________,<br><br>

This letter confirms that the eviction appeal documents prepared for your case have been filed with the appropriate Texas Justice Court based on the information you provided to our office.<br><br>

Our document preparation and filing assistance services for this matter are now complete.<br><br>

Please note we do not provide legal advice.<br><br>

Prime Relief Solutions<br>
Phone: (877) 234-3578<br>
Email: help@prsolution.org`;
}

let w=window.open("");
w.document.write(`<html><body style="font-family:Arial;padding:25px;font-size:15px;line-height:1.6;">${content}<br><br><button onclick="window.print()">Print</button></body></html>`);
}

</script>

</body>
</html>
