<!DOCTYPE html>
<html>
<head>
  <title>Prime Relief Solutions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#f4f6f8; color:#000; }
    .dark-mode { background:#121212; color:white; }

    .box { background:white; padding:12px; margin-bottom:15px; border-radius:10px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .dark-mode .box { background:#1f1f1f; }

    input, button { padding:8px; border-radius:6px; border:1px solid #ccc; font-size:11px; }
    button { cursor:pointer; font-weight:bold; }

    /* 🔥 BUTTON COLORS */
    .btn-blue { background:#007bff; color:white; }
    .btn-green { background:#28a745; color:white; }
    .btn-orange { background:#fd7e14; color:white; }
    .btn-purple { background:#6f42c1; color:white; }
    .btn-red { background:#dc3545; color:white; }
    .btn-gray { background:#6c757d; color:white; }

    table { width:100%; border-collapse:collapse; background:white; }
    th, td { border:1.5px solid #555; padding:6px; font-size:11px; }

    h1, .subtext { color:#BFA13A; margin:0; }

    .toggle-container { margin-left:auto; display:flex; gap:8px; align-items:center; }

    .mode-circle {
      width:26px; height:26px; border-radius:50%;
      background: linear-gradient(to right, #3498db 50%, #000 50%);
    }

    #loginOverlay {
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      display:flex; justify-content:center; align-items:center;
      z-index:9999;
      background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
      url("Prime Relief.PNG") center/cover no-repeat;
    }

    #loginBox {
      background: rgba(255,255,255,0.9);
      padding:20px;
      border-radius:12px;
      text-align:center;
    }

    .header-bar {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginOverlay">
  <div id="loginBox">
    <h3>Team Login</h3>
    <input id="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>
    <button class="btn-blue" onclick="login()">Login</button>
    <span style="cursor:pointer;color:#007bff;" onclick="resetPassword()">Forgot Password?</span>
  </div>
</div>

<!-- HEADER -->
<div class="header-bar">
  <div style="display:flex; align-items:center; gap:15px;">
    <img src="Prime Relief.PNG" style="height:95px;" />
    <div>
      <h1>Prime Relief Solutions</h1>
      <div class="subtext">Professional LDP Eviction Support & Lead Management</div>
    </div>
  </div>

  <div style="display:flex; gap:8px;">
    <button class="btn-gray" onclick="clearView()">Clear View</button>

    <!-- LINK BUTTON -->
    <button class="btn-purple" onclick="window.open('https://jpwebsite.harriscountytx.gov/FindMyCase/search.jsp')">
      Case Search
    </button>

    <button class="btn-blue" onclick="openDoc('intake')">Intake</button>
    <button class="btn-orange" onclick="openDoc('checklist')">Checklist</button>
    <button class="btn-green" onclick="openDoc('script')">Call Script</button>
    <button class="btn-red" onclick="openDoc('appeal')">Appeal</button>
    <button class="btn-gray" onclick="openDoc('workflow')">Workflow</button>

    <button class="btn-red" onclick="logout()">Logout</button>
  </div>
</div>

<!-- BOX -->
<div class="box">
  <input type="file" id="file" />
  <button class="btn-green" onclick="upload()">Upload</button>

  <input placeholder="Search Name" id="searchName" oninput="debounceFilter()">
  <input placeholder="ZIP" id="searchZip" oninput="debounceFilter()">
  <input placeholder="Min $" id="minAmt" oninput="debounceFilter()">
  <input placeholder="Max $" id="maxAmt" oninput="debounceFilter()">

  <div class="toggle-container">
    <label><input type="checkbox" onchange="toggleDark()"> Dark</label>
    <div class="mode-circle"></div>
  </div>
</div>

<table>
<thead>
<tr>
<th>Case #</th>
<th>Name</th>
<th>Address</th>
<th>Amount</th>
<th>Date</th>
<th>Lead</th>
<th>Status</th>
<th>Updated By</th>
<th>Map</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>

/* ================= DOCUMENT SYSTEM ================= */
function openDoc(type){
let content="";

/* 🔥 FULL INTENT SYSTEM RESTORED */
if(type==="intake"){
content=`
<h2>Initial Call — Intake & Eligibility Check</h2>
<hr>

<b>Goal:</b> confirm appeal is still possible<br><br>

<b>Ask Immediately:</b><br>
• Judgment date signed?<br>
• Justice Court (Precinct & County)?<br>
• Date received judgment?<br>
• Filed Notice of Appeal?<br>
• Appeal type: Bond / Cash / Inability?<br><br>

<b>Deadline Script:</b><br>
"In Texas, appeals must usually be filed within 5 days."<br><br>

<b>LDP Disclosure:</b><br>
We are a legal document prep service, not attorneys.<br><br>

<b>Client Info:</b><br>
Name / Phone / Email / Address / Court / Case #<br><br>

<b>Appeal Options:</b><br>
Bond / Cash Deposit / Statement of Inability<br><br>

<b>Service Explanation:</b><br>
We prepare documents only. You file them.<br><br>

<b>Fee Transparency:</b><br>
Service fee: $___<br><br>

<b>Documents Needed:</b><br>
Court info, plaintiff, defendant, judgment date, address`;
}

if(type==="checklist"){
content=`
<h2>Eviction Appeal Checklist</h2>
<hr>
☐ Notice of Appeal<br>
☐ Appeal Bond / Pauper Affidavit<br>
☐ Court Copy<br>
☐ Landlord Copy<br>
☐ Lease Agreement<br>
☐ Payment Records<br>
☐ Case Number Verified`;
}

if(type==="script"){
content=`
<h2>Call Script</h2>
<hr>
Hello, is this [Name]?<br><br>
We help clients with eviction appeal preparation.<br><br>
Do you want more time or need to stop eviction process?<br><br>
We can prepare and file documents today.`;
}

if(type==="appeal"){
content=`
<h2>Notice of Appeal</h2>
<hr>
Defendant: _______<br>
Case #: _______<br>
Court: _______<br><br>
I appeal this eviction judgment.<br><br>
Signature: _______`;
}

if(type==="workflow"){
content=`
<h2>Workflow</h2>
<hr>
1. Intake Client<br>
2. Verify Deadline<br>
3. Collect Case Info<br>
4. Choose Appeal Type<br>
5. Prepare Documents<br>
6. Send Client Files<br>
7. Follow Up<br>
8. Record Case`;
}

let w=window.open("");
w.document.write(`
<html><body style="font-family:Arial;padding:20px;">
${content}
<br><br><button onclick="window.print()">Print</button>
</body></html>
`);
}

/* ================= FIREBASE (UNCHANGED) ================= */
const firebaseConfig = {
  apiKey: "AIzaSyA7E8hzpSD5b7ygCj_Xshq5qUEkXKDp_pA",
  authDomain: "prsolutions-lead-management.firebaseapp.com",
  projectId: "prsolutions-lead-management"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const auth=firebase.auth();

let currentUser="", allData=[], existingCases=new Set(), debounceTimer;

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .catch(e=>alert(e.message));
}

function resetPassword(){
  if(!email.value) return alert("Enter email");
  auth.sendPasswordResetEmail(email.value);
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
  if(user){
    currentUser=user.email;
    loginOverlay.style.display="none";
  } else {
    loginOverlay.style.display="flex";
  }
});

function toggleDark(){ document.body.classList.toggle("dark-mode"); }

</script>

</body>
</html>
